<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>全方位紀錄系統 V27 專業雲端版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', -apple-system, system-ui, sans-serif; -webkit-tap-highlight-color: transparent; background-color: #F8FAFC; margin: 0; }
        .input-field { width: 100%; background: #F1F5F9; border: 2px solid transparent; border-radius: 12px; font-weight: 800; color: #1E293B; outline: none; padding: 12px; transition: all 0.2s; font-size: 14px; }
        .input-field:focus { border-color: #3B82F6; background: white; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .animate-slide-up { animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
        import { getFirestore, collection, doc, addDoc, updateDoc, deleteDoc, onSnapshot, query, serverTimestamp, getDocs } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-auth.js";

        const firebaseConfig = JSON.parse(window.__firebase_config || '{"apiKey":"","authDomain":"","projectId":"","storageBucket":"","messagingSenderId":"","appId":""}');
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'v27-full-pro';
        const initialToken = typeof __initial_auth_token !== 'undefined' ? __initial_auth_token : null;

        let db = null, auth = null;
        try {
            if (firebaseConfig.apiKey) {
                const app = initializeApp(firebaseConfig);
                db = getFirestore(app);
                auth = getAuth(app);
            }
        } catch (e) { console.error("Firebase Init Fail", e); }

        window.FB_CORE = { 
            db, auth, collection, doc, addDoc, updateDoc, deleteDoc, onSnapshot, query, getDocs,
            serverTimestamp, appId, signInAnonymously, onAuthStateChanged, signInWithCustomToken,
            initialToken
        };
        window.dispatchEvent(new Event('firebase-ready'));
    </script>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        const Icon = ({ name, size = 18, className = "", strokeWidth = 2.5 }) => {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [name, size]);
            return <i data-lucide={name} className={className} style={{ width: size, height: size }}></i>;
        };

        const App = () => {
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [books, setBooks] = useState([]);
            const [activeBookId, setActiveBookId] = useState(null);
            const [records, setRecords] = useState([]);
            
            // UI 狀態
            const [isMenuOpen, setIsMenuOpen] = useState(false);
            const [showReport, setShowReport] = useState(false);
            const [isAddingBook, setIsAddingBook] = useState(false);
            const [isEditing, setIsEditing] = useState(false);
            const [filter, setFilter] = useState('all');

            const getLocalDate = () => {
                const now = new Date();
                return `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`;
            };

            const [form, setForm] = useState({ date: getLocalDate(), match: '', market: '', gap: '', odds: '', units: 1, id: null, status: 'pending' });
            const [newBookForm, setNewBookForm] = useState({ name: '', type: 'sports' });

            // 1. 初始化 Auth
            useEffect(() => {
                const fb = window.FB_CORE;
                if (!fb || !fb.auth) { setLoading(false); return; }

                const initAuth = async () => {
                    try {
                        if (fb.initialToken) await fb.signInWithCustomToken(fb.auth, fb.initialToken);
                        else await fb.signInAnonymously(fb.auth);
                    } catch (e) { console.error(e); setLoading(false); }
                };

                initAuth();
                const unsubscribe = fb.onAuthStateChanged(fb.auth, (u) => {
                    if (u) { setUser(u); setLoading(false); }
                });
                return () => unsubscribe();
            }, []);

            // 2. 監聽帳簿 & 建立預設帳簿機制
            useEffect(() => {
                if (!user) return;
                const fb = window.FB_CORE;
                const booksRef = fb.collection(fb.db, 'artifacts', fb.appId, 'users', user.uid, 'books');

                return fb.onSnapshot(booksRef, (snap) => {
                    const list = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                    setBooks(list);
                    
                    // 如果沒資料，立刻自動建立一個預設帳簿
                    if (snap.empty) {
                        fb.addDoc(booksRef, { 
                            name: '預設紀錄簿', 
                            type: 'sports', 
                            unitAmount: '1000', 
                            createdAt: fb.serverTimestamp() 
                        });
                    } else if (!activeBookId) {
                        setActiveBookId(list[0].id);
                    }
                });
            }, [user]);

            // 3. 監聽紀錄
            useEffect(() => {
                if (!user || !activeBookId) return;
                const fb = window.FB_CORE;
                const recsRef = fb.collection(fb.db, 'artifacts', fb.appId, 'users', user.uid, 'records_' + activeBookId);
                return fb.onSnapshot(recsRef, (snap) => {
                    setRecords(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                });
            }, [user, activeBookId]);

            const activeBook = useMemo(() => {
                return books.find(b => b.id === activeBookId) || { name: '載入中...', type: 'sports', unitAmount: '1000' };
            }, [books, activeBookId]);

            // 核心盈虧計算邏輯 (V27 完整版)
            const calculateProfit = (r) => {
                const unitVal = parseFloat(activeBook.unitAmount) || 0;
                const units = parseFloat(r.units) || 0;
                if (activeBook.type === 'baccarat') return units * unitVal;
                if (r.status === 'pending') return 0;
                const odds = parseFloat(r.odds) || 0;
                const betSize = units * unitVal;
                if (r.status === 'win') return betSize * (odds - 1);
                if (r.status === 'loss') return -betSize;
                if (r.status === 'push') return 0;
                if (r.status === 'half') {
                    // 解析分洞邏輯 (如 -3.5 或 +0.5)
                    const gVal = parseFloat(r.gap?.toString().replace(/[^\d.-]/g, '')) || 50;
                    const isWinHalf = r.gap?.toString().includes('+') || parseFloat(r.gap) > 0;
                    return isWinHalf ? (betSize * (odds - 1)) * 0.5 : -(betSize * 0.5);
                }
                return 0;
            };

            const filteredRecords = useMemo(() => {
                return records.sort((a, b) => b.date.localeCompare(a.date));
            }, [records]);

            const totalProfit = filteredRecords.reduce((s, r) => s + calculateProfit(r), 0);

            // 操作方法
            const handleSubmit = async (e) => {
                e.preventDefault();
                if (!user || !activeBookId) return;
                const fb = window.FB_CORE;
                const colRef = fb.collection(fb.db, 'artifacts', fb.appId, 'users', user.uid, 'records_' + activeBookId);
                
                if (isEditing && form.id) {
                    const { id, ...data } = form;
                    await fb.updateDoc(fb.doc(fb.db, 'artifacts', fb.appId, 'users', user.uid, 'records_' + activeBookId, id), data);
                } else {
                    await fb.addDoc(colRef, { ...form, createdAt: fb.serverTimestamp() });
                }
                setForm({ date: getLocalDate(), match: '', market: '', gap: '', odds: '', units: 1, id: null, status: 'pending' });
                setIsEditing(false);
            };

            const handleStatus = async (id, status) => {
                const fb = window.FB_CORE;
                await fb.updateDoc(fb.doc(fb.db, 'artifacts', fb.appId, 'users', user.uid, 'records_' + activeBookId, id), { status });
            };

            if (loading) return (
                <div className="h-screen flex flex-col items-center justify-center bg-slate-900 text-white">
                    <div className="w-12 h-12 border-4 border-blue-500 border-t-transparent rounded-full animate-spin mb-4"></div>
                    <div className="font-black italic text-sm tracking-widest">V27 PRO CONNECTING...</div>
                </div>
            );

            return (
                <div className="min-h-screen bg-[#F8FAFC] pb-24 animate-slide-up">
                    {/* Header */}
                    <div className="bg-white border-b sticky top-0 z-40 px-4 py-3 shadow-sm">
                        <div className="max-w-md mx-auto flex justify-between items-center">
                            <button onClick={() => setIsMenuOpen(true)} className="p-2 text-slate-400 hover:text-slate-900 transition-colors"><Icon name="menu" /></button>
                            <div className="text-center flex-1 mx-4 overflow-hidden">
                                <h1 className="text-sm font-black text-slate-800 truncate">{activeBook.name}</h1>
                                <div className="text-[8px] font-black text-blue-500 uppercase tracking-widest flex items-center justify-center gap-1">
                                    <div className="w-1 h-1 bg-blue-500 rounded-full animate-pulse"></div> 雲端同步中
                                </div>
                            </div>
                            <button onClick={() => setShowReport(true)} className="p-2 text-slate-900"><Icon name="bar-chart-2" /></button>
                        </div>
                    </div>

                    <div className="max-w-md mx-auto p-4 space-y-4">
                        {/* 盈虧卡片 */}
                        <div className="grid grid-cols-2 gap-3">
                            <div className="bg-white p-5 rounded-[2rem] border shadow-sm text-center">
                                <div className="text-[10px] font-black text-slate-400 uppercase mb-1 tracking-wider">目前盈虧</div>
                                <div className={`text-xl font-black ${totalProfit >= 0 ? 'text-green-500' : 'text-red-500'}`}>
                                    {Math.round(totalProfit).toLocaleString()}
                                </div>
                            </div>
                            <div className="bg-white p-5 rounded-[2rem] border shadow-sm text-center">
                                <div className="text-[10px] font-black text-slate-400 uppercase mb-1 tracking-wider">總場次</div>
                                <div className="text-xl font-black text-slate-800">{filteredRecords.length}</div>
                            </div>
                        </div>

                        {/* 單注金額設定 */}
                        <div className="bg-blue-600 p-4 rounded-3xl shadow-xl shadow-blue-100 flex justify-between items-center text-white">
                            <div className="flex items-center gap-3">
                                <div className="p-2 bg-white/20 rounded-xl"><Icon name="wallet" size={16} /></div>
                                <span className="text-xs font-black">單位價值設定</span>
                            </div>
                            <div className="flex items-center bg-white/10 rounded-2xl px-4 py-2 border border-white/20">
                                <span className="text-[10px] mr-2">$</span>
                                <input type="number" value={activeBook.unitAmount} onChange={async (e) => {
                                    const fb = window.FB_CORE;
                                    await fb.updateDoc(fb.doc(fb.db, 'artifacts', fb.appId, 'users', user.uid, 'books', activeBookId), { unitAmount: e.target.value });
                                }} className="bg-transparent w-20 text-right outline-none font-black text-sm" />
                            </div>
                        </div>

                        {/* 輸入表單 */}
                        <div className="bg-white p-6 rounded-[2.5rem] border shadow-sm">
                            <h2 className="text-[10px] font-black text-slate-300 mb-4 uppercase tracking-widest">{isEditing ? '編輯雲端紀錄' : '新增雲端紀錄'}</h2>
                            <form className="space-y-3" onSubmit={handleSubmit}>
                                <input type="date" value={form.date} onChange={e => setForm({...form, date: e.target.value})} className="input-field" />
                                <input placeholder="比賽 / 項目名稱" value={form.match} onChange={e => setForm({...form, match: e.target.value})} className="input-field" required />
                                
                                {activeBook.type === 'sports' ? (
                                    <>
                                        <div className="grid grid-cols-2 gap-2">
                                            <input placeholder="盤口 (讓分)" value={form.market} onChange={e => setForm({...form, market: e.target.value})} className="input-field" />
                                            <input placeholder="分洞 (半贏+)" value={form.gap} onChange={e => setForm({...form, gap: e.target.value})} className="input-field" />
                                        </div>
                                        <div className="grid grid-cols-2 gap-2">
                                            <div className="relative">
                                                <div className="absolute left-3 top-1/2 -translate-y-1/2 text-[9px] font-black text-blue-500">賠率</div>
                                                <input type="number" step="0.001" value={form.odds} onChange={e => setForm({...form, odds: e.target.value})} className="input-field pl-12 bg-blue-50/30" placeholder="0.00" required />
                                            </div>
                                            <div className="relative">
                                                <div className="absolute left-3 top-1/2 -translate-y-1/2 text-[9px] font-black text-indigo-500">注數</div>
                                                <input type="number" step="0.1" value={form.units} onChange={e => setForm({...form, units: e.target.value})} className="input-field pl-12 bg-indigo-50/30" placeholder="1.0" required />
                                            </div>
                                        </div>
                                    </>
                                ) : (
                                    <div className="relative">
                                        <div className="absolute left-4 top-1/2 -translate-y-1/2 text-[10px] font-black text-green-600">盈虧注數</div>
                                        <input type="number" step="0.01" value={form.units} onChange={e => setForm({...form, units: e.target.value})} className="input-field pl-20 bg-green-50/30 font-black" placeholder="正數為贏，負數為輸" required />
                                    </div>
                                )}
                                
                                <button type="submit" className={`w-full py-4 rounded-2xl text-white font-black text-sm shadow-lg transition-all active:scale-95 ${isEditing ? 'bg-orange-500 shadow-orange-100' : 'bg-slate-900 shadow-slate-200'}`}>
                                    {isEditing ? '更新此筆紀錄' : '儲存至雲端'}
                                </button>
                                {isEditing && <button type="button" onClick={() => {setIsEditing(false); setForm({ date: getLocalDate(), match: '', market: '', gap: '', odds: '', units: 1, id: null, status: 'pending' });}} className="w-full text-slate-400 text-[10px] font-black mt-2 uppercase underline">取消編輯</button>}
                            </form>
                        </div>

                        {/* 紀錄清單 */}
                        <div className="space-y-2">
                            {filteredRecords.map(r => {
                                const p = calculateProfit(r);
                                return (
                                    <div key={r.id} className="bg-white p-4 rounded-2xl border shadow-sm flex items-center gap-4 group relative overflow-hidden">
                                        <div className="flex-1 min-w-0">
                                            <div className="text-xs font-black text-slate-800 truncate">{r.match}</div>
                                            <div className="text-[9px] font-bold text-slate-400 uppercase tracking-tighter">
                                                {r.date} | {activeBook.type==='sports' ? `${r.market} @${r.odds} (${r.units}注)` : `${r.units} 注數`}
                                            </div>
                                        </div>

                                        {activeBook.type === 'sports' && (
                                            <div className="flex gap-1">
                                                {['win', 'loss', 'push', 'half'].map(st => (
                                                    <button key={st} onClick={() => handleStatus(r.id, st)} className={`w-7 h-7 rounded-lg flex items-center justify-center transition-all ${r.status === st ? (st==='win'?'bg-green-500':st==='loss'?'bg-red-500':st==='push'?'bg-orange-400':'bg-slate-700') + ' text-white shadow-md' : 'bg-slate-50 text-slate-300 hover:bg-slate-100'}`}>
                                                        {st==='win'?<Icon name="check" size={12}/>:st==='loss'?<Icon name="x" size={12}/>:st==='push'?'走':'半'}
                                                    </button>
                                                ))}
                                            </div>
                                        )}

                                        <div className="text-right min-w-[60px]">
                                            <div className={`text-xs font-black ${p > 0 ? 'text-green-500' : p < 0 ? 'text-red-500' : 'text-slate-300'}`}>
                                                {p !== 0 ? (p > 0 ? '+' : '') + Math.round(p).toLocaleString() : 'PENDING'}
                                            </div>
                                        </div>

                                        {/* 操作選單 */}
                                        <div className="absolute inset-y-0 right-0 flex items-center bg-white/90 backdrop-blur-sm opacity-0 group-hover:opacity-100 transition-opacity px-2 gap-1 border-l">
                                            <button onClick={() => { setForm(r); setIsEditing(true); window.scrollTo({top: 0, behavior: 'smooth'}); }} className="p-2 text-blue-500 bg-blue-50 rounded-lg"><Icon name="edit-3" size={14} /></button>
                                            <button onClick={async () => { if(confirm("確定刪除？")) await window.FB_CORE.deleteDoc(window.FB_CORE.doc(window.FB_CORE.db, 'artifacts', window.FB_CORE.appId, 'users', user.uid, 'records_'+activeBookId, r.id)); }} className="p-2 text-red-500 bg-red-50 rounded-lg"><Icon name="trash-2" size={14} /></button>
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    </div>

                    {/* 報表彈窗 (完整 V27 版) */}
                    {showReport && (
                        <div className="fixed inset-0 bg-white z-[100] overflow-y-auto p-6 no-scrollbar animate-slide-up">
                            <div className="max-w-md mx-auto">
                                <button onClick={() => setShowReport(false)} className="flex items-center gap-2 text-slate-400 font-black mb-8 hover:text-slate-900 transition-colors"><Icon name="arrow-left" size={20} /> 返回紀錄主頁</button>
                                
                                <div className="bg-slate-900 text-white p-8 rounded-[2.5rem] shadow-2xl mb-8">
                                    <div className="text-[10px] font-black text-blue-400 uppercase tracking-[0.2em] mb-2">Performance Summary</div>
                                    <h2 className="text-2xl font-black mb-8">{activeBook.name}</h2>
                                    
                                    <div className="grid grid-cols-2 gap-8 border-t border-white/10 pt-8">
                                        <div>
                                            <div className="text-[9px] font-black opacity-40 uppercase mb-1">Total Profit</div>
                                            <div className={`text-2xl font-black ${totalProfit>=0?'text-green-400':'text-red-400'}`}>${Math.round(totalProfit).toLocaleString()}</div>
                                        </div>
                                        <div>
                                            <div className="text-[9px] font-black opacity-40 uppercase mb-1">Win Rate</div>
                                            <div className="text-2xl font-black text-yellow-400">
                                                {records.length > 0 ? ((records.filter(r=>calculateProfit(r)>0).length / records.length)*100).toFixed(1) : 0}%
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                <div className="space-y-4">
                                    <h3 className="text-xs font-black text-slate-400 uppercase pl-2">Daily Breakdown</h3>
                                    <div className="overflow-hidden border border-slate-100 rounded-3xl bg-white shadow-sm">
                                        <table className="w-full text-left text-[11px] font-bold">
                                            <thead className="bg-slate-50 text-slate-400 uppercase text-[9px] border-b">
                                                <tr>
                                                    <th className="px-5 py-4">項目</th>
                                                    <th className="px-2 py-4 text-center">結果</th>
                                                    <th className="px-5 py-4 text-right">金額</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-slate-50">
                                                {filteredRecords.map(r => {
                                                    const p = calculateProfit(r);
                                                    return (
                                                        <tr key={r.id}>
                                                            <td className="px-5 py-4">
                                                                <div className="text-slate-700 truncate max-w-[120px]">{r.match}</div>
                                                                <div className="text-[8px] opacity-40">{r.date}</div>
                                                            </td>
                                                            <td className={`px-2 py-4 text-center font-black ${p>0?'text-green-500':p<0?'text-red-500':'text-slate-300'}`}>
                                                                {r.status.toUpperCase()}
                                                            </td>
                                                            <td className={`px-5 py-4 text-right font-black ${p>=0?'text-green-600':'text-red-600'}`}>
                                                                {Math.round(p).toLocaleString()}
                                                            </td>
                                                        </tr>
                                                    );
                                                })}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* 側選單 */}
                    {isMenuOpen && (
                        <div className="fixed inset-0 bg-slate-900/60 z-50 backdrop-blur-sm" onClick={() => setIsMenuOpen(false)}>
                            <div className="bg-white w-72 h-full p-6 shadow-2xl flex flex-col animate-slide-up" onClick={e => e.stopPropagation()}>
                                <h2 className="font-black italic text-xl mb-8 flex items-center gap-2"><Icon name="layers" className="text-blue-600"/> 帳簿總覽</h2>
                                <div className="flex-1 space-y-2 overflow-y-auto no-scrollbar">
                                    {books.map(b => (
                                        <div key={b.id} onClick={() => { setActiveBookId(b.id); setIsMenuOpen(false); }} className={`group p-4 rounded-2xl cursor-pointer transition-all border-2 ${activeBookId === b.id ? 'border-blue-500 bg-blue-50 text-blue-700' : 'border-slate-50 text-slate-400 hover:border-slate-200'}`}>
                                            <div className="flex justify-between items-center">
                                                <div>
                                                    <div className="font-black text-sm">{b.name}</div>
                                                    <div className="text-[9px] uppercase font-bold opacity-60">{b.type}</div>
                                                </div>
                                                <button onClick={(e) => { e.stopPropagation(); if(confirm("確定永久刪除此帳簿及其所有數據？")) window.FB_CORE.deleteDoc(window.FB_CORE.doc(window.FB_CORE.db, 'artifacts', window.FB_CORE.appId, 'users', user.uid, 'books', b.id)); }} className="p-2 text-slate-300 hover:text-red-500 opacity-0 group-hover:opacity-100 transition-opacity"><Icon name="trash-2" size={14} /></button>
                                            </div>
                                        </div>
                                    ))}
                                    <button onClick={() => setIsAddingBook(true)} className="w-full py-4 border-2 border-dashed border-slate-200 rounded-2xl text-slate-400 font-black text-[10px] uppercase hover:bg-slate-50 transition-all">+ Add New Book</button>
                                </div>
                                <div className="pt-6 border-t mt-auto">
                                    <div className="text-[9px] font-black text-slate-300 uppercase">Cloud Linked User ID</div>
                                    <div className="text-[10px] font-bold text-slate-400 truncate">{user?.uid}</div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* 新增帳簿彈窗 */}
                    {isAddingBook && (
                        <div className="fixed inset-0 bg-slate-900/80 z-[70] flex items-center justify-center p-6 backdrop-blur-md">
                            <div className="bg-white w-full max-w-xs rounded-[2.5rem] p-8 shadow-2xl animate-slide-up text-center">
                                <div className="w-16 h-16 bg-blue-50 text-blue-600 rounded-full flex items-center justify-center mx-auto mb-4"><Icon name="book-plus" size={32} /></div>
                                <h3 className="text-xl font-black text-slate-800 mb-2">建立新紀錄簿</h3>
                                <p className="text-xs text-slate-400 mb-8 font-bold">為您的不同賽事或投資分類</p>
                                <div className="space-y-4 mb-8">
                                    <input value={newBookForm.name} onChange={e => setNewBookForm({...newBookForm, name: e.target.value})} className="input-field text-center" placeholder="輸入名稱 (如: 足球歐冠)" />
                                    <div className="grid grid-cols-2 gap-3">
                                        <button onClick={() => setNewBookForm({...newBookForm, type: 'sports'})} className={`py-4 rounded-2xl text-[10px] font-black transition-all ${newBookForm.type === 'sports' ? 'bg-blue-600 text-white shadow-xl shadow-blue-100' : 'bg-slate-50 text-slate-400'}`}>體育</button>
                                        <button onClick={() => setNewBookForm({...newBookForm, type: 'baccarat'})} className={`py-4 rounded-2xl text-[10px] font-black transition-all ${newBookForm.type === 'baccarat' ? 'bg-indigo-600 text-white shadow-xl shadow-indigo-100' : 'bg-slate-50 text-slate-400'}`}>百家樂</button>
                                    </div>
                                </div>
                                <button onClick={async () => {
                                    if (!newBookForm.name || !user) return;
                                    const fb = window.FB_CORE;
                                    await fb.addDoc(fb.collection(fb.db, 'artifacts', fb.appId, 'users', user.uid, 'books'), { ...newBookForm, unitAmount: '1000', createdAt: fb.serverTimestamp() });
                                    setIsAddingBook(false);
                                    setIsMenuOpen(false);
                                    setNewBookForm({name:'', type:'sports'});
                                }} className="w-full bg-slate-900 text-white py-4 rounded-2xl font-black text-sm shadow-xl active:scale-95 transition-all">建立帳簿</button>
                                <button onClick={() => setIsAddingBook(false)} className="w-full text-slate-300 text-[10px] font-black mt-6 uppercase tracking-widest">放棄</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
