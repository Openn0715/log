<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>全方位紀錄系統 V28</title>
    <!-- 核心依賴：確保順序正確 -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body { -webkit-tap-highlight-color: transparent; font-family: -apple-system, sans-serif; background: #F8FAFC; }
        .input-field { width: 100%; background: #F1F5F9; border: 2px solid transparent; border-radius: 12px; font-weight: 800; color: #1E293B; outline: none; padding: 12px; transition: all 0.2s; font-size: 14px; }
        .input-field:focus { border-color: #3B82F6; background: white; box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        #loading-screen { position: fixed; inset: 0; background: #0F172A; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; color: white; }
        .animate-spin { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="loading-screen">
        <div class="animate-spin" style="width: 32px; height: 32px; border: 4px solid #3B82F6; border-top-color: transparent; border-radius: 50%;"></div>
        <p style="margin-top: 16px; font-weight: 900; font-size: 12px; letter-spacing: 1px;">系統載入中...</p>
    </div>

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const { 
            Trash2, Edit3, Plus, X, Check, Menu, FileText, ArrowLeft, TrendingUp, Save, Loader2, ChevronRight
        } = lucide;

        const App = () => {
            const getLocalDate = () => {
                const now = new Date();
                return `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`;
            };

            // --- 狀態定義 ---
            const [isMenuOpen, setIsMenuOpen] = useState(false);
            const [showReport, setShowReport] = useState(false);
            const [isAddingBook, setIsAddingBook] = useState(false);
            const [books, setBooks] = useState([]);
            const [activeBookId, setActiveBookId] = useState(null);
            const [records, setRecords] = useState([]);
            const [filter, setFilter] = useState('all');
            const [customRange, setCustomRange] = useState({ start: getLocalDate(), end: getLocalDate() });
            const [form, setForm] = useState({ 
                date: getLocalDate(), match: '', market: '', gap: '', odds: '', units: 1, id: null, status: 'pending' 
            });
            const [newBookForm, setNewBookForm] = useState({ name: '', type: 'sports' });

            // --- 初始化與持久化 ---
            useEffect(() => {
                const savedBooks = localStorage.getItem('suite_v28_books');
                if (savedBooks) {
                    const parsed = JSON.parse(savedBooks);
                    setBooks(parsed);
                    if (parsed.length > 0) setActiveBookId(parsed[0].id);
                } else {
                    const def = [{ id: 'def-sports', name: '我的體育紀錄', type: 'sports', unitAmount: '1000' }];
                    setBooks(def);
                    setActiveBookId('def-sports');
                    localStorage.setItem('suite_v28_books', JSON.stringify(def));
                }
                document.getElementById('loading-screen').style.display = 'none';
            }, []);

            useEffect(() => {
                if (activeBookId) {
                    const savedRecords = localStorage.getItem(`suite_v28_records_${activeBookId}`);
                    setRecords(savedRecords ? JSON.parse(savedRecords) : []);
                }
            }, [activeBookId]);

            useEffect(() => {
                if (activeBookId && records.length >= 0) {
                    localStorage.setItem(`suite_v28_records_${activeBookId}`, JSON.stringify(records));
                }
            }, [records, activeBookId]);

            const activeBook = useMemo(() => 
                books.find(b => b.id === activeBookId) || { name: '未選擇', type: 'sports', unitAmount: '1000' }
            , [books, activeBookId]);

            // --- 計算邏輯 (還原截圖公式) ---
            const calculateRecordProfit = (r) => {
                const unitVal = parseFloat(activeBook.unitAmount) || 0;
                const units = parseFloat(r.units) || 0;
                if (activeBook.type === 'baccarat') return units * unitVal;
                if (r.status === 'pending') return 0;
                const odds = parseFloat(r.odds) || 0;
                const betSize = units * unitVal;
                
                if (r.status === 'win') return betSize * (odds - 1);
                if (r.status === 'loss') return -betSize;
                if (r.status === 'push') return 0;
                if (r.status === 'half') {
                    const gVal = parseFloat(r.gap.toString().replace(/[^\d.-]/g, '')) || 50;
                    const isWinHalf = r.gap.toString().includes('+') || parseFloat(r.gap) > 0;
                    const percentage = Math.abs(gVal) / 100;
                    return isWinHalf ? (betSize * (odds - 1)) * percentage : -(betSize * percentage);
                }
                return 0;
            };

            const filteredData = useMemo(() => {
                const today = getLocalDate();
                return records.filter(r => {
                    if (filter === 'all') return true;
                    if (filter === 'today') return r.date === today;
                    if (filter === 'month') return r.date.substring(0, 7) === today.substring(0, 7);
                    if (filter === 'custom') return r.date >= customRange.start && r.date <= customRange.end;
                    return true;
                }).sort((a, b) => b.date.localeCompare(a.date) || b.id - a.id);
            }, [records, filter, customRange]);

            const totalProfitSum = filteredData.reduce((s, r) => s + calculateRecordProfit(r), 0);
            const winCount = filteredData.filter(r => calculateRecordProfit(r) > 0).length;
            const lossCount = filteredData.filter(r => calculateRecordProfit(r) < 0).length;
            const winRate = (winCount + lossCount) > 0 ? ((winCount / (winCount + lossCount)) * 100).toFixed(1) : "0.0";

            const groupedData = filteredData.reduce((groups, record) => {
                const date = record.date;
                if (!groups[date]) groups[date] = [];
                groups[date].push(record);
                return groups;
            }, {});

            // --- 動作方法 ---
            const handleAddRecord = () => {
                if (!form.match && activeBook.type === 'sports') return;
                const newRec = { ...form, id: Date.now() };
                setRecords([newRec, ...records]);
                setForm({ ...form, match: '', market: '', gap: '', odds: '', units: 1, id: null, status: 'pending' });
            };

            const handleUnitChange = (val) => {
                const updatedBooks = books.map(b => b.id === activeBookId ? { ...b, unitAmount: val } : b);
                setBooks(updatedBooks);
                localStorage.setItem('suite_v28_books', JSON.stringify(updatedBooks));
            };

            const deleteRecord = (id) => {
                setRecords(records.filter(r => r.id !== id));
            };

            const updateStatus = (id, status) => {
                setRecords(records.map(r => r.id === id ? { ...r, status } : r));
            };

            // --- UI 組件 ---
            return (
                <div className="min-h-screen pb-24">
                    {/* 導覽列 */}
                    <header className="bg-white/90 backdrop-blur-md sticky top-0 z-40 border-b p-4 flex justify-between items-center shadow-sm">
                        <button onClick={() => setIsMenuOpen(true)} className="p-2 text-slate-400"><Menu size={24}/></button>
                        <div className="text-center px-4 min-w-0">
                            <h1 className="text-sm font-black truncate text-slate-800">{activeBook.name}</h1>
                            <p className="text-[9px] font-black text-blue-500 uppercase tracking-widest mt-0.5">V28 紀錄系統</p>
                        </div>
                        <button onClick={() => setShowReport(true)} className="p-2 bg-slate-900 text-white rounded-xl shadow-lg"><FileText size={20}/></button>
                    </header>

                    <main className="p-4 max-w-md mx-auto space-y-4">
                        {/* 看板 */}
                        <div className="bg-blue-600 p-6 rounded-[2.5rem] shadow-xl text-white relative overflow-hidden">
                            <div className="relative z-10 flex justify-between items-end">
                                <div>
                                    <p className="text-[10px] font-black opacity-40 uppercase mb-1">目前總損益</p>
                                    <p className="text-3xl font-black tracking-tighter">{Math.round(totalProfitSum).toLocaleString()}</p>
                                </div>
                                <div className="text-right">
                                    <p className="text-[10px] font-black opacity-40 mb-1">單注價值</p>
                                    <div className="bg-white/20 px-3 py-1 rounded-lg flex items-center border border-white/10">
                                        <span className="text-[10px] mr-1">$</span>
                                        <input 
                                            type="number" 
                                            value={activeBook.unitAmount} 
                                            onChange={(e) => handleUnitChange(e.target.value)}
                                            className="bg-transparent w-16 text-right font-black text-xs outline-none"
                                        />
                                    </div>
                                </div>
                            </div>
                        </div>

                        {/* 輸入表單 */}
                        <div className="bg-white p-5 rounded-[2rem] border shadow-sm space-y-3">
                            <div className="grid grid-cols-2 gap-2">
                                <input type="date" value={form.date} onChange={e => setForm({...form, date: e.target.value})} className="input-field col-span-2" />
                                <input placeholder={activeBook.type === 'sports' ? "場次項目" : "備註"} value={form.match} onChange={e => setForm({...form, match: e.target.value})} className="input-field col-span-2" />
                                {activeBook.type === 'sports' ? (
                                    <>
                                        <input type="number" step="0.01" placeholder="賠率" value={form.odds} onChange={e => setForm({...form, odds: e.target.value})} className="input-field" />
                                        <input type="number" step="0.1" placeholder="注數" value={form.units} onChange={e => setForm({...form, units: e.target.value})} className="input-field" />
                                        <input placeholder="盤口 (可選)" value={form.market} onChange={e => setForm({...form, market: e.target.value})} className="input-field" />
                                        <input placeholder="分洞 (例:+50)" value={form.gap} onChange={e => setForm({...form, gap: e.target.value})} className="input-field" />
                                    </>
                                ) : (
                                    <input type="number" step="0.1" placeholder="輸贏注數 (負數為輸)" value={form.units} onChange={e => setForm({...form, units: e.target.value})} className="input-field col-span-2 bg-green-50" />
                                )}
                            </div>
                            <button onClick={handleAddRecord} className="w-full bg-slate-900 text-white py-4 rounded-2xl font-black text-xs shadow-lg active:scale-[0.98] transition-all">
                                儲存雲端紀錄
                            </button>
                        </div>

                        {/* 列表渲染 */}
                        {Object.entries(groupedData).map(([date, items]) => (
                            <div key={date} className="space-y-2">
                                <div className="text-[10px] font-black text-slate-300 px-2 uppercase tracking-widest">{date}</div>
                                {items.map(r => {
                                    const p = calculateRecordProfit(r);
                                    return (
                                        <div key={r.id} className="bg-white p-4 rounded-2xl border flex items-center justify-between group transition-all">
                                            <div className="min-w-0 flex-1">
                                                <div className="flex items-center gap-2">
                                                    <span className="text-xs font-black text-slate-700 truncate">{r.match || '無備註'}</span>
                                                    {r.market && <span className="text-[8px] bg-slate-100 px-1 rounded text-slate-400 font-bold">{r.market}</span>}
                                                </div>
                                                <p className="text-[9px] font-bold text-slate-400 mt-1 uppercase">
                                                    {activeBook.type === 'sports' ? `${r.odds} @ ${r.units}注 ${r.gap ? `(${r.gap}%)` : ''}` : `${r.units}注`}
                                                </p>
                                            </div>
                                            <div className="flex items-center gap-3">
                                                {activeBook.type === 'sports' && (
                                                    <div className="flex gap-1">
                                                        <button onClick={() => updateStatus(r.id, 'win')} className={`p-1.5 rounded-lg ${r.status==='win' ? 'bg-green-500 text-white' : 'bg-slate-50 text-slate-300'}`}><Check size={12}/></button>
                                                        <button onClick={() => updateStatus(r.id, 'loss')} className={`p-1.5 rounded-lg ${r.status==='loss' ? 'bg-red-500 text-white' : 'bg-slate-50 text-slate-300'}`}><X size={12}/></button>
                                                    </div>
                                                )}
                                                <div className={`text-sm font-black w-16 text-right ${p > 0 ? 'text-green-500' : p < 0 ? 'text-red-500' : 'text-slate-200'}`}>
                                                    {Math.round(p).toLocaleString()}
                                                </div>
                                                <button onClick={() => deleteRecord(r.id)} className="text-slate-200 hover:text-red-400 opacity-0 group-hover:opacity-100 transition-opacity">
                                                    <Trash2 size={14}/>
                                                </button>
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        ))}
                    </main>

                    {/* 側邊選單 */}
                    {isMenuOpen && (
                        <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-50" onClick={() => setIsMenuOpen(false)}>
                            <div className="w-72 bg-white h-full p-6 flex flex-col" onClick={e => e.stopPropagation()}>
                                <div className="flex justify-between items-center mb-8">
                                    <h3 className="font-black italic text-lg">帳簿總覽</h3>
                                    <button onClick={() => setIsAddingBook(true)} className="p-2 bg-blue-600 text-white rounded-xl shadow-lg"><Plus size={20}/></button>
                                </div>
                                <div className="flex-1 overflow-y-auto space-y-3 no-scrollbar">
                                    {books.map(b => (
                                        <div key={b.id} onClick={() => { setActiveBookId(b.id); setIsMenuOpen(false); }} className={`p-4 rounded-2xl border transition-all cursor-pointer ${activeBookId === b.id ? 'bg-slate-900 text-white shadow-xl' : 'bg-white text-slate-400 border-slate-100'}`}>
                                            <p className="text-sm font-black">{b.name}</p>
                                            <p className="text-[9px] font-bold mt-1 opacity-50 uppercase tracking-widest">{b.type}</p>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}

                    {/* 新增帳簿 Modal */}
                    {isAddingBook && (
                        <div className="fixed inset-0 z-[100] bg-slate-900/60 backdrop-blur-xl flex items-center justify-center p-6">
                            <div className="bg-white w-full max-w-xs rounded-[2.5rem] p-8 shadow-2xl space-y-6">
                                <h4 className="text-center font-black text-xl text-slate-800 tracking-tighter">建立新帳簿</h4>
                                <input placeholder="帳簿名稱" value={newBookForm.name} onChange={e => setNewBookForm({...newBookForm, name: e.target.value})} className="input-field" />
                                <div className="grid grid-cols-2 gap-2">
                                    <button onClick={() => setNewBookForm({...newBookForm, type: 'sports'})} className={`py-4 rounded-2xl text-[10px] font-black ${newBookForm.type === 'sports' ? 'bg-blue-600 text-white' : 'bg-slate-50 text-slate-400'}`}>體育模式</button>
                                    <button onClick={() => setNewBookForm({...newBookForm, type: 'baccarat'})} className={`py-4 rounded-2xl text-[10px] font-black ${newBookForm.type === 'baccarat' ? 'bg-indigo-600 text-white' : 'bg-slate-50 text-slate-400'}`}>百家樂</button>
                                </div>
                                <button onClick={() => {
                                    if(!newBookForm.name) return;
                                    const nb = { id: 'book-'+Date.now(), ...newBookForm, unitAmount: '1000' };
                                    const newList = [...books, nb];
                                    setBooks(newList);
                                    localStorage.setItem('suite_v28_books', JSON.stringify(newList));
                                    setActiveBookId(nb.id);
                                    setIsAddingBook(false);
                                    setIsMenuOpen(false);
                                }} className="w-full bg-slate-900 text-white py-4 rounded-2xl font-black text-xs">確認建立</button>
                                <button onClick={() => setIsAddingBook(false)} className="w-full text-slate-300 text-[10px] font-bold text-center">取消</button>
                            </div>
                        </div>
                    )}

                    {/* 報表 Modal */}
                    {showReport && (
                        <div className="fixed inset-0 bg-white z-[100] p-6 overflow-y-auto">
                            <button onClick={() => setShowReport(false)} className="flex items-center gap-2 text-slate-400 font-black mb-6">
                                <ArrowLeft size={20} /> 返回紀錄
                            </button>
                            <div className="bg-slate-900 text-white p-8 rounded-[2.5rem] mb-8 shadow-2xl relative overflow-hidden">
                                <div className="relative z-10">
                                    <h2 className="text-2xl font-black tracking-tighter">{activeBook.name}</h2>
                                    <p className="text-[10px] font-black text-blue-400 uppercase tracking-[0.2em] mt-1">Analytics Report</p>
                                    <div className="mt-8 grid grid-cols-3 gap-4">
                                        <div><p className="text-[8px] font-black opacity-30 uppercase">總損益</p><p className="text-lg font-black text-green-400">${Math.round(totalProfitSum).toLocaleString()}</p></div>
                                        <div><p className="text-[8px] font-black opacity-30 uppercase">勝率</p><p className="text-lg font-black text-yellow-400">{winRate}%</p></div>
                                        <div><p className="text-[8px] font-black opacity-30 uppercase">紀錄數</p><p className="text-lg font-black">{filteredData.length}</p></div>
                                    </div>
                                </div>
                                <div className="absolute top-0 right-0 p-8 opacity-10"><FileText size={80}/></div>
                            </div>

                            <div className="border rounded-3xl overflow-hidden shadow-sm">
                                <table className="w-full text-[11px] text-left">
                                    <thead className="bg-slate-50 border-b font-black text-slate-400 uppercase">
                                        <tr><th className="p-4">項目</th><th className="p-4 text-center">數據</th><th className="p-4 text-right">盈虧</th></tr>
                                    </thead>
                                    <tbody>
                                        {filteredData.map(r => {
                                            const p = calculateRecordProfit(r);
                                            return (
                                                <tr key={r.id} className="border-b last:border-0">
                                                    <td className="p-4 font-bold text-slate-700">{r.match || '-'}</td>
                                                    <td className="p-4 text-center font-black text-blue-600">{activeBook.type==='sports' ? r.odds : r.units}</td>
                                                    <td className={`p-4 text-right font-black ${p >= 0 ? 'text-green-500' : 'text-red-500'}`}>{Math.round(p).toLocaleString()}</td>
                                                </tr>
                                            );
                                        })}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
        // 確保圖標正確載入
        setTimeout(() => lucide.createIcons(), 500);
    </script>
</body>
</html>
