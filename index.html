<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>全方位紀錄系統 V27 終極版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Noto+Sans+TC:wght@400;700;900&display=swap');
        body { font-family: 'Inter', 'Noto Sans TC', sans-serif; -webkit-tap-highlight-color: transparent; background-color: #F8FAFC; margin: 0; }
        .input-field { width: 100%; background: #F1F5F9; border: 2px solid transparent; border-radius: 12px; font-weight: 800; color: #1E293B; outline: none; padding: 12px; transition: all 0.2s; font-size: 14px; }
        .input-field:focus { border-color: #3B82F6; background: white; shadow: 0 0 0 4px rgba(59, 130, 246, 0.1); }
        .btn-status { transition: all 0.2s; cursor: pointer; display: flex; align-items: center; justify-content: center; border-radius: 10px; font-weight: 900; font-size: 10px; }
        .animate-pop { animation: pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes pop { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
        import { getFirestore, collection, doc, addDoc, updateDoc, deleteDoc, onSnapshot, query, serverTimestamp, getDocs } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-auth.js";

        const firebaseConfig = JSON.parse(window.__firebase_config || '{"apiKey":"","authDomain":"","projectId":"","storageBucket":"","messagingSenderId":"","appId":""}');
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'v27-stable-final';
        const initialToken = typeof __initial_auth_token !== 'undefined' ? __initial_auth_token : null;

        let db = null, auth = null;
        try {
            if (firebaseConfig.apiKey) {
                const app = initializeApp(firebaseConfig);
                db = getFirestore(app);
                auth = getAuth(app);
            }
        } catch (e) { console.error("Firebase Init Fail", e); }

        window.FB_CORE = { 
            db, auth, collection, doc, addDoc, updateDoc, deleteDoc, onSnapshot, query, getDocs,
            serverTimestamp, appId, signInAnonymously, onAuthStateChanged, signInWithCustomToken,
            initialToken
        };
        window.dispatchEvent(new Event('firebase-ready'));
    </script>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const Icon = ({ name, size = 18, className = "" }) => {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [name, size]);
            return <i data-lucide={name} className={className} style={{ width: size, height: size }}></i>;
        };

        const App = () => {
            const [user, setUser] = useState(null);
            const [isAuthLoading, setIsAuthLoading] = useState(true);
            const [books, setBooks] = useState([]);
            const [activeBookId, setActiveBookId] = useState(null);
            const [records, setRecords] = useState([]);
            
            // UI 狀態
            const [isMenuOpen, setIsMenuOpen] = useState(false);
            const [showReport, setShowReport] = useState(false);
            const [isAddingBook, setIsAddingBook] = useState(false);
            const [isEditing, setIsEditing] = useState(false);

            const getLocalDate = () => new Date().toISOString().split('T')[0];

            const [form, setForm] = useState({ date: getLocalDate(), match: '', market: '', gap: '', odds: '', units: 1, id: null, status: 'pending' });
            const [newBookForm, setNewBookForm] = useState({ name: '', type: 'sports' });

            // 1. 登入初始化
            useEffect(() => {
                const fb = window.FB_CORE;
                if (!fb || !fb.auth) { setIsAuthLoading(false); return; }
                const initAuth = async () => {
                    try {
                        if (fb.initialToken) await fb.signInWithCustomToken(fb.auth, fb.initialToken);
                        else await fb.signInAnonymously(fb.auth);
                    } catch (e) { console.error(e); }
                };
                initAuth();
                const unsubscribe = fb.onAuthStateChanged(fb.auth, (u) => {
                    setUser(u);
                    setIsAuthLoading(false);
                });
                return () => unsubscribe();
            }, []);

            // 2. 帳簿連線與預設檢查
            useEffect(() => {
                if (!user) return;
                const fb = window.FB_CORE;
                const booksRef = fb.collection(fb.db, 'artifacts', fb.appId, 'users', user.uid, 'books');

                const unsub = fb.onSnapshot(booksRef, (snap) => {
                    const list = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                    setBooks(list);
                    
                    // 若雲端沒帳簿，自動建立預設
                    if (snap.empty) {
                        fb.addDoc(booksRef, { 
                            name: '我的紀錄簿', 
                            type: 'sports', 
                            unitAmount: '1000', 
                            createdAt: fb.serverTimestamp() 
                        });
                    } else if (!activeBookId && list.length > 0) {
                        setActiveBookId(list[0].id);
                    }
                }, (err) => console.error("Book sync err", err));

                return unsub;
            }, [user]);

            // 3. 紀錄連線
            useEffect(() => {
                if (!user || !activeBookId) { setRecords([]); return; }
                const fb = window.FB_CORE;
                const recsRef = fb.collection(fb.db, 'artifacts', fb.appId, 'users', user.uid, 'records_' + activeBookId);
                return fb.onSnapshot(recsRef, (snap) => {
                    setRecords(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                });
            }, [user, activeBookId]);

            const activeBook = useMemo(() => {
                return books.find(b => b.id === activeBookId) || { name: '等待資料...', type: 'sports', unitAmount: '1000' };
            }, [books, activeBookId]);

            // 核心功能：盈虧計算
            const calculateProfit = (r) => {
                const unitVal = parseFloat(activeBook.unitAmount) || 0;
                const units = parseFloat(r.units) || 0;
                if (activeBook.type === 'baccarat') return units * unitVal;
                if (r.status === 'pending' || r.status === 'push') return 0;
                
                const odds = parseFloat(r.odds) || 0;
                const betSize = units * unitVal;
                if (r.status === 'win') return betSize * (odds - 1);
                if (r.status === 'loss') return -betSize;
                if (r.status === 'half') {
                    const isWinHalf = r.gap?.toString().includes('+') || parseFloat(r.gap) > 0;
                    return isWinHalf ? (betSize * (odds - 1)) * 0.5 : -(betSize * 0.5);
                }
                return 0;
            };

            const sortedRecords = useMemo(() => {
                return [...records].sort((a, b) => b.date.localeCompare(a.date));
            }, [records]);

            const totalProfit = sortedRecords.reduce((s, r) => s + calculateProfit(r), 0);

            // 提交表單
            const handleFormSubmit = async (e) => {
                e.preventDefault();
                if (!user || !activeBookId) return;
                const fb = window.FB_CORE;
                const colPath = ['artifacts', fb.appId, 'users', user.uid, 'records_' + activeBookId];
                try {
                    if (isEditing && form.id) {
                        const { id, ...data } = form;
                        await fb.updateDoc(fb.doc(fb.db, ...colPath, id), data);
                    } else {
                        await fb.addDoc(fb.collection(fb.db, ...colPath), { ...form, createdAt: fb.serverTimestamp() });
                    }
                    setForm({ date: getLocalDate(), match: '', market: '', gap: '', odds: '', units: 1, id: null, status: 'pending' });
                    setIsEditing(false);
                } catch (err) { console.error(err); }
            };

            const updateStatus = async (id, status) => {
                const fb = window.FB_CORE;
                await fb.updateDoc(fb.doc(fb.db, 'artifacts', fb.appId, 'users', user.uid, 'records_' + activeBookId, id), { status });
            };

            if (isAuthLoading) return (
                <div className="h-screen flex flex-col items-center justify-center bg-slate-900 text-white">
                    <div className="w-10 h-10 border-4 border-blue-500 border-t-transparent rounded-full animate-spin mb-4"></div>
                    <div className="font-black italic tracking-widest text-[10px]">SYNCING CLOUD DATA...</div>
                </div>
            );

            return (
                <div className="min-h-screen bg-slate-50 pb-20 animate-pop">
                    {/* Header */}
                    <div className="bg-white border-b sticky top-0 z-40 px-4 py-3 flex justify-between items-center shadow-sm">
                        <button onClick={() => setIsMenuOpen(true)} className="p-2 text-slate-400 hover:text-blue-500 transition-colors"><Icon name="layers"/></button>
                        <div className="text-center overflow-hidden flex-1 px-4">
                            <h1 className="text-xs font-black text-slate-800 truncate uppercase tracking-tight">{activeBook.name}</h1>
                            <div className="text-[8px] font-black text-blue-500 uppercase flex items-center justify-center gap-1">
                                <span className="w-1 h-1 bg-blue-500 rounded-full animate-ping"></span> 雲端在線
                            </div>
                        </div>
                        <button onClick={() => setShowReport(true)} className="p-2 text-slate-900"><Icon name="activity"/></button>
                    </div>

                    <div className="max-w-md mx-auto p-4 space-y-4">
                        {/* 頂部總覽 */}
                        <div className="grid grid-cols-2 gap-3">
                            <div className="bg-white p-5 rounded-3xl border shadow-sm text-center">
                                <div className="text-[9px] font-black text-slate-400 uppercase mb-1">目前總盈虧</div>
                                <div className={`text-xl font-black ${totalProfit >= 0 ? 'text-green-500' : 'text-red-500'}`}>
                                    {Math.round(totalProfit).toLocaleString()}
                                </div>
                            </div>
                            <div className="bg-white p-5 rounded-3xl border shadow-sm text-center">
                                <div className="text-[9px] font-black text-slate-400 uppercase mb-1">總計場次</div>
                                <div className="text-xl font-black text-slate-800">{sortedRecords.length}</div>
                            </div>
                        </div>

                        {/* 單位金額 */}
                        <div className="bg-slate-900 p-4 rounded-3xl shadow-xl flex justify-between items-center text-white">
                            <div className="flex items-center gap-2 pl-2">
                                <Icon name="coins" size={16} className="text-blue-400"/>
                                <span className="text-[10px] font-black uppercase">單位價值</span>
                            </div>
                            <div className="flex items-center bg-white/10 rounded-2xl px-4 py-2">
                                <span className="text-[10px] mr-2 opacity-40">$</span>
                                <input type="number" value={activeBook.unitAmount} onChange={async (e) => {
                                    const fb = window.FB_CORE;
                                    await fb.updateDoc(fb.doc(fb.db, 'artifacts', fb.appId, 'users', user.uid, 'books', activeBookId), { unitAmount: e.target.value });
                                }} className="bg-transparent w-20 text-right outline-none font-black text-sm" />
                            </div>
                        </div>

                        {/* 輸入區域 */}
                        <div className="bg-white p-6 rounded-[2rem] border shadow-sm">
                            <h2 className="text-[10px] font-black text-slate-300 mb-4 uppercase tracking-[0.2em]">{isEditing ? 'EDITING RECORD' : 'NEW RECORD'}</h2>
                            <form className="space-y-3" onSubmit={handleFormSubmit}>
                                <input type="date" value={form.date} onChange={e => setForm({...form, date: e.target.value})} className="input-field" />
                                <input placeholder="比賽名稱 / 備註" value={form.match} onChange={e => setForm({...form, match: e.target.value})} className="input-field" required />
                                
                                {activeBook.type === 'sports' ? (
                                    <>
                                        <div className="grid grid-cols-2 gap-2">
                                            <input placeholder="盤口" value={form.market} onChange={e => setForm({...form, market: e.target.value})} className="input-field" />
                                            <input placeholder="分洞 (半贏寫+)" value={form.gap} onChange={e => setForm({...form, gap: e.target.value})} className="input-field" />
                                        </div>
                                        <div className="grid grid-cols-2 gap-2">
                                            <input type="number" step="0.001" placeholder="賠率" value={form.odds} onChange={e => setForm({...form, odds: e.target.value})} className="input-field bg-blue-50/50" required />
                                            <input type="number" step="0.1" placeholder="注數" value={form.units} onChange={e => setForm({...form, units: e.target.value})} className="input-field bg-indigo-50/50" required />
                                        </div>
                                    </>
                                ) : (
                                    <input type="number" step="0.01" placeholder="盈虧注數 (輸請寫負號)" value={form.units} onChange={e => setForm({...form, units: e.target.value})} className="input-field bg-green-50/50 font-black" required />
                                )}

                                <button type="submit" className={`w-full py-4 rounded-2xl text-white font-black text-sm shadow-lg transition-transform active:scale-95 ${isEditing ? 'bg-orange-500' : 'bg-blue-600'}`}>
                                    {isEditing ? '更新紀錄' : '儲存紀錄'}
                                </button>
                                {isEditing && <button type="button" onClick={() => setIsEditing(false)} className="w-full text-slate-300 text-[10px] font-black mt-2 underline uppercase">Cancel Edit</button>}
                            </form>
                        </div>

                        {/* 紀錄列表 */}
                        <div className="space-y-2">
                            {sortedRecords.map(r => {
                                const p = calculateProfit(r);
                                return (
                                    <div key={r.id} className="bg-white p-4 rounded-2xl border shadow-sm flex items-center group relative overflow-hidden">
                                        <div className="flex-1 min-w-0 pr-4">
                                            <div className="text-xs font-black text-slate-800 truncate">{r.match}</div>
                                            <div className="text-[9px] font-bold text-slate-400 uppercase tracking-tighter">
                                                {r.date} | {activeBook.type==='sports' ? `${r.market} @${r.odds}` : `${r.units}注`}
                                            </div>
                                        </div>

                                        {activeBook.type === 'sports' && (
                                            <div className="flex gap-1 mr-4">
                                                {['win', 'loss', 'half', 'push'].map(st => (
                                                    <button key={st} onClick={() => updateStatus(r.id, st)} className={`w-8 h-8 btn-status ${r.status === st ? 'bg-slate-900 text-white shadow-lg' : 'bg-slate-50 text-slate-300'}`}>
                                                        {st==='win'?'贏':st==='loss'?'輸':st==='half'?'半':'走'}
                                                    </button>
                                                ))}
                                            </div>
                                        )}

                                        <div className={`text-right min-w-[60px] font-black text-xs ${p > 0 ? 'text-green-500' : p < 0 ? 'text-red-500' : 'text-slate-300'}`}>
                                            {p !== 0 ? (p > 0 ? '+' : '') + Math.round(p).toLocaleString() : 'WAIT'}
                                        </div>

                                        {/* 操作蓋板 */}
                                        <div className="absolute right-0 inset-y-0 flex items-center gap-1 px-2 bg-white/95 border-l opacity-0 group-hover:opacity-100 transition-opacity">
                                            <button onClick={() => { setForm(r); setIsEditing(true); window.scrollTo(0,0); }} className="p-2 text-blue-500 bg-blue-50 rounded-lg"><Icon name="edit-3" size={14}/></button>
                                            <button onClick={async () => { if(confirm("確定刪除此紀錄？")) await window.FB_CORE.deleteDoc(window.FB_CORE.doc(window.FB_CORE.db, 'artifacts', window.FB_CORE.appId, 'users', user.uid, 'records_'+activeBookId, r.id)); }} className="p-2 text-red-500 bg-red-50 rounded-lg"><Icon name="trash-2" size={14}/></button>
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    </div>

                    {/* 報表介面 */}
                    {showReport && (
                        <div className="fixed inset-0 bg-white z-[100] p-6 overflow-y-auto no-scrollbar animate-pop">
                            <button onClick={()=>setShowReport(false)} className="mb-8 flex items-center gap-2 text-slate-400 font-black text-sm"><Icon name="chevron-left"/> 返回首頁</button>
                            <div className="bg-slate-900 text-white p-8 rounded-[2.5rem] shadow-2xl mb-6">
                                <h2 className="text-xl font-black mb-1">{activeBook.name}</h2>
                                <div className="text-[10px] font-black text-blue-400 uppercase tracking-widest mb-8 italic">Full Performance Analysis</div>
                                <div className="grid grid-cols-2 gap-8">
                                    <div>
                                        <div className="text-[8px] opacity-40 uppercase mb-1">Total P/L</div>
                                        <div className={`text-2xl font-black ${totalProfit>=0?'text-green-400':'text-red-400'}`}>${Math.round(totalProfit).toLocaleString()}</div>
                                    </div>
                                    <div>
                                        <div className="text-[8px] opacity-40 uppercase mb-1">Win Percentage</div>
                                        <div className="text-2xl font-black text-yellow-400">
                                            {records.length > 0 ? (records.filter(r=>calculateProfit(r)>0).length/records.length*100).toFixed(1) : 0}%
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <div className="space-y-2">
                                {sortedRecords.map(r => {
                                    const p = calculateProfit(r);
                                    return (
                                        <div key={r.id} className="flex justify-between items-center py-3 border-b text-[11px] font-bold">
                                            <div>
                                                <div className="text-slate-800">{r.match}</div>
                                                <div className="text-[8px] text-slate-300">{r.date}</div>
                                            </div>
                                            <div className={`${p>=0?'text-green-600':'text-red-600'}`}>{Math.round(p).toLocaleString()}</div>
                                        </div>
                                    );
                                })}
                            </div>
                        </div>
                    )}

                    {/* 帳簿管理 (側選單) */}
                    {isMenuOpen && (
                        <div className="fixed inset-0 bg-slate-900/60 z-50 flex" onClick={()=>setIsMenuOpen(false)}>
                            <div className="bg-white w-72 h-full p-6 shadow-2xl animate-pop" onClick={e=>e.stopPropagation()}>
                                <h2 className="font-black text-xl mb-8 flex items-center gap-2"><Icon name="book" className="text-blue-600"/> 我的帳簿</h2>
                                <div className="space-y-2 overflow-y-auto max-h-[70vh] no-scrollbar">
                                    {books.map(b => (
                                        <div key={b.id} onClick={() => { setActiveBookId(b.id); setIsMenuOpen(false); }} className={`p-4 rounded-2xl border-2 transition-all cursor-pointer relative group ${activeBookId === b.id ? 'border-blue-500 bg-blue-50 text-blue-700' : 'border-slate-50 text-slate-400'}`}>
                                            <div className="font-black text-sm">{b.name}</div>
                                            <div className="text-[9px] uppercase font-bold opacity-40">{b.type}</div>
                                            <button onClick={(e) => { e.stopPropagation(); if(confirm("確定永久刪除此帳簿及其所有資料？")) window.FB_CORE.deleteDoc(window.FB_CORE.doc(window.FB_CORE.db, 'artifacts', window.FB_CORE.appId, 'users', user.uid, 'books', b.id)); }} className="absolute right-4 top-1/2 -translate-y-1/2 text-red-500 p-2 opacity-0 group-hover:opacity-100 transition-opacity"><Icon name="trash-2" size={14}/></button>
                                        </div>
                                    ))}
                                    <button onClick={()=>setIsAddingBook(true)} className="w-full py-4 border-2 border-dashed border-slate-200 rounded-2xl text-slate-300 font-black text-[10px] uppercase">+ New Book</button>
                                </div>
                                <div className="mt-auto pt-6 border-t text-[8px] font-bold text-slate-300">USER: {user?.uid}</div>
                            </div>
                        </div>
                    )}

                    {/* 新增帳簿彈窗 */}
                    {isAddingBook && (
                        <div className="fixed inset-0 bg-slate-900/80 z-[70] flex items-center justify-center p-6 backdrop-blur-md">
                            <div className="bg-white w-full max-w-xs rounded-[2.5rem] p-8 shadow-2xl animate-pop">
                                <h3 className="text-lg font-black mb-6 text-center">建立新紀錄簿</h3>
                                <div className="space-y-4">
                                    <input value={newBookForm.name} onChange={e => setNewBookForm({...newBookForm, name: e.target.value})} className="input-field text-center" placeholder="輸入名稱" />
                                    <div className="grid grid-cols-2 gap-2">
                                        <button onClick={()=>setNewBookForm({...newBookForm, type:'sports'})} className={`py-4 rounded-2xl text-[10px] font-black transition-all ${newBookForm.type==='sports'?'bg-blue-600 text-white shadow-xl shadow-blue-100':'bg-slate-100 text-slate-400'}`}>體育博彩</button>
                                        <button onClick={()=>setNewBookForm({...newBookForm, type:'baccarat'})} className={`py-4 rounded-2xl text-[10px] font-black transition-all ${newBookForm.type==='baccarat'?'bg-indigo-600 text-white shadow-xl shadow-indigo-100':'bg-slate-100 text-slate-400'}`}>百家樂</button>
                                    </div>
                                    <button onClick={async () => {
                                        if(!newBookForm.name || !user) return;
                                        const fb = window.FB_CORE;
                                        await fb.addDoc(fb.collection(fb.db, 'artifacts', fb.appId, 'users', user.uid, 'books'), { ...newBookForm, unitAmount: '1000', createdAt: fb.serverTimestamp() });
                                        setIsAddingBook(false); setIsMenuOpen(false); setNewBookForm({name:'', type:'sports'});
                                    }} className="w-full bg-slate-900 text-white py-4 rounded-2xl font-black text-sm shadow-xl active:scale-95 transition-all">確認建立</button>
                                    <button onClick={()=>setIsAddingBook(false)} className="w-full text-slate-300 text-[10px] font-black uppercase text-center">取消</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
