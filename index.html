<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>全方位紀錄系統 V29</title>
    <!-- 1. 引入樣式與核心引擎 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- 2. 引入圖標庫 -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        body { -webkit-tap-highlight-color: transparent; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        .input-field { width: 100%; background: #F1F5F9; border: 2px solid transparent; border-radius: 12px; font-weight: 800; color: #1E293B; outline: none; padding: 12px; transition: all 0.2s; font-size: 14px; }
        .input-field:focus { border-color: #3B82F6; background: white; box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .animate-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-[#F8FAFC]">
    <div id="root"></div>

    <!-- 這是讓瀏覽器可以即時解析 React 語法的標籤 -->
    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const { 
          Trash2, Edit3, Plus, X, Check, 
          Menu, FileText, ArrowLeft, TrendingUp, Save, Loader2
        } = lucide;

        const App = () => {
          const [books, setBooks] = useState([]);
          const [activeBookId, setActiveBookId] = useState(null);
          const [records, setRecords] = useState([]);
          const [isMenuOpen, setIsMenuOpen] = useState(false);
          const [showReport, setShowReport] = useState(false);
          const [isAddingBook, setIsAddingBook] = useState(false);
          const [filter, setFilter] = useState('all');
          
          const getToday = () => new Date().toISOString().split('T')[0];
          const [form, setForm] = useState({ 
            date: getToday(), match: '', market: '', gap: '', odds: '', 
            units: 1, id: null, status: 'pending' 
          });

          // --- 數據持久化邏輯 (使用 localStorage 確保刷新不見) ---
          useEffect(() => {
            const savedBooks = localStorage.getItem('suite_v29_books');
            if (savedBooks) {
              const parsed = JSON.parse(savedBooks);
              setBooks(parsed);
              if (parsed.length > 0) setActiveBookId(parsed[0].id);
            } else {
              const def = [{ id: 'def-1', name: '預設帳簿', type: 'sports', unitAmount: '1000' }];
              setBooks(def);
              setActiveBookId('def-1');
              localStorage.setItem('suite_v29_books', JSON.stringify(def));
            }
          }, []);

          useEffect(() => {
            if (activeBookId) {
              const savedRecords = localStorage.getItem(`suite_v29_rec_${activeBookId}`);
              setRecords(savedRecords ? JSON.parse(savedRecords) : []);
            }
          }, [activeBookId]);

          const activeBook = useMemo(() => 
            books.find(b => b.id === activeBookId) || { name: '載入中', type: 'sports', unitAmount: '1000' }
          , [books, activeBookId]);

          // --- 動作方法 ---
          const saveRecord = () => {
            if (!activeBookId) return;
            const newRecords = [ { ...form, id: Date.now() }, ...records ];
            setRecords(newRecords);
            localStorage.setItem(`suite_v29_rec_${activeBookId}`, JSON.stringify(newRecords));
            setForm({ date: getToday(), match: '', market: '', gap: '', odds: '', units: 1, id: null, status: 'pending' });
          };

          const updateStatus = (id, status) => {
            const newRecords = records.map(r => r.id === id ? { ...r, status } : r);
            setRecords(newRecords);
            localStorage.setItem(`suite_v29_rec_${activeBookId}`, JSON.stringify(newRecords));
          };

          const deleteRecord = (id) => {
            const newRecords = records.filter(r => r.id !== id);
            setRecords(newRecords);
            localStorage.setItem(`suite_v29_rec_${activeBookId}`, JSON.stringify(newRecords));
          };

          const calculateProfit = (r) => {
            const unit = parseFloat(activeBook.unitAmount) || 0;
            const u = parseFloat(r.units) || 0;
            if (activeBook.type === 'baccarat') return u * unit;
            if (r.status === 'pending') return 0;
            const odds = parseFloat(r.odds) || 0;
            if (r.status === 'win') return u * unit * (odds - 1);
            if (r.status === 'loss') return -(u * unit);
            if (r.status === 'push') return 0;
            return 0;
          };

          // --- 渲染 UI ---
          return (
            <div className="max-w-md mx-auto min-h-screen pb-20">
              <header className="bg-white border-b p-4 sticky top-0 z-30 flex justify-between items-center shadow-sm">
                <button onClick={() => setIsMenuOpen(true)} className="p-2 text-slate-400"><Menu size={24}/></button>
                <div className="text-center">
                  <h1 className="font-black text-sm">{activeBook.name}</h1>
                  <p className="text-[10px] font-bold text-blue-500 uppercase">{activeBook.type === 'sports' ? '體育紀錄' : '百家樂'}</p>
                </div>
                <button onClick={() => setShowReport(true)} className="p-2 bg-slate-900 text-white rounded-xl shadow-lg"><FileText size={20}/></button>
              </header>

              <main className="p-4 space-y-4">
                {/* 盈虧看板 */}
                <div className="bg-blue-600 p-4 rounded-3xl text-white shadow-xl flex justify-between items-center">
                  <div>
                    <p className="text-[10px] font-bold opacity-60">總盈虧計</p>
                    <p className="text-xl font-black">{Math.round(records.reduce((s, r) => s + calculateProfit(r), 0)).toLocaleString()}</p>
                  </div>
                  <div className="text-right">
                    <p className="text-[10px] font-bold opacity-60">單注價值</p>
                    <p className="text-sm font-black">${activeBook.unitAmount}</p>
                  </div>
                </div>

                {/* 輸入表單 */}
                <div className="bg-white p-4 rounded-[2rem] border shadow-sm space-y-2">
                  <input type="date" value={form.date} onChange={e => setForm({...form, date: e.target.value})} className="input-field" />
                  <input placeholder="備註/項目" value={form.match} onChange={e => setForm({...form, match: e.target.value})} className="input-field" />
                  <div className="grid grid-cols-2 gap-2">
                    {activeBook.type === 'sports' ? (
                      <>
                        <input type="number" step="0.01" placeholder="賠率" value={form.odds} onChange={e => setForm({...form, odds: e.target.value})} className="input-field" />
                        <input type="number" step="0.1" placeholder="注數" value={form.units} onChange={e => setForm({...form, units: e.target.value})} className="input-field" />
                      </>
                    ) : (
                      <input type="number" step="0.1" placeholder="贏輸注數" value={form.units} onChange={e => setForm({...form, units: e.target.value})} className="input-field col-span-2 bg-green-50" />
                    )}
                  </div>
                  <button onClick={saveRecord} className="w-full bg-slate-900 text-white py-4 rounded-2xl font-black text-xs">儲存紀錄</button>
                </div>

                {/* 列表 */}
                <div className="space-y-2">
                  {records.map(r => {
                    const p = calculateProfit(r);
                    return (
                      <div key={r.id} className="bg-white p-4 rounded-2xl border flex items-center justify-between group animate-in">
                        <div className="min-w-0">
                          <p className="text-xs font-black truncate">{r.match || '無備註'}</p>
                          <p className="text-[10px] text-slate-400 font-bold">{r.date} | {activeBook.type === 'sports' ? `${r.odds} 賠` : `${r.units} 注`}</p>
                        </div>
                        <div className="flex items-center gap-4">
                          {activeBook.type === 'sports' && (
                            <div className="flex gap-1">
                              <button onClick={() => updateStatus(r.id, 'win')} className={`p-1 rounded-md ${r.status==='win' ? 'bg-green-500 text-white' : 'bg-slate-50 text-slate-300'}`}><Check size={14}/></button>
                              <button onClick={() => updateStatus(r.id, 'loss')} className={`p-1 rounded-md ${r.status==='loss' ? 'bg-red-500 text-white' : 'bg-slate-50 text-slate-300'}`}><X size={14}/></button>
                            </div>
                          )}
                          <div className={`text-sm font-black ${p > 0 ? 'text-green-500' : p < 0 ? 'text-red-500' : 'text-slate-200'}`}>
                            {Math.round(p).toLocaleString()}
                          </div>
                          <button onClick={() => deleteRecord(r.id)} className="text-slate-200 hover:text-red-400"><Trash2 size={14}/></button>
                        </div>
                      </div>
                    );
                  })}
                </div>
              </main>

              {/* 選單側欄 */}
              {isMenuOpen && (
                <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-50 flex" onClick={() => setIsMenuOpen(false)}>
                  <div className="w-64 bg-white h-full p-6 shadow-2xl" onClick={e => e.stopPropagation()}>
                    <div className="flex justify-between items-center mb-6">
                      <h2 className="font-black">我的帳簿</h2>
                      <button onClick={() => setIsAddingBook(true)} className="p-1 bg-blue-600 text-white rounded-lg"><Plus size={16}/></button>
                    </div>
                    <div className="space-y-2">
                      {books.map(b => (
                        <div key={b.id} onClick={() => { setActiveBookId(b.id); setIsMenuOpen(false); }} className={`p-3 rounded-xl border text-xs font-black cursor-pointer ${activeBookId === b.id ? 'bg-slate-900 text-white shadow-lg' : 'bg-white text-slate-400 border-slate-100'}`}>
                          {b.name}
                        </div>
                      ))}
                    </div>
                  </div>
                </div>
              )}

              {/* 新增帳簿彈窗 */}
              {isAddingBook && (
                <div className="fixed inset-0 z-[100] bg-slate-900/60 backdrop-blur-md flex items-center justify-center p-6">
                  <div className="bg-white w-full max-w-xs rounded-[2rem] p-8 shadow-2xl space-y-4">
                    <h3 className="text-center font-black">建立帳簿</h3>
                    <input placeholder="名稱" className="input-field" id="newBookName" />
                    <select className="input-field" id="newBookType">
                      <option value="sports">體育模式 (顯示賠率)</option>
                      <option value="baccarat">百家樂模式 (顯示注數)</option>
                    </select>
                    <button onClick={() => {
                      const name = document.getElementById('newBookName').value;
                      const type = document.getElementById('newBookType').value;
                      if (!name) return;
                      const nb = { id: Date.now().toString(), name, type, unitAmount: '1000' };
                      const newList = [...books, nb];
                      setBooks(newList);
                      localStorage.setItem('suite_v29_books', JSON.stringify(newList));
                      setActiveBookId(nb.id);
                      setIsAddingBook(false);
                      setIsMenuOpen(false);
                    }} className="w-full bg-blue-600 text-white py-4 rounded-2xl font-black">確認</button>
                    <button onClick={() => setIsAddingBook(false)} className="w-full text-slate-300 text-xs font-bold">取消</button>
                  </div>
                </div>
              )}

              {/* 報表視窗 */}
              {showReport && (
                <div className="fixed inset-0 bg-white z-[100] p-6 overflow-y-auto">
                  <button onClick={() => setShowReport(false)} className="flex items-center gap-2 text-slate-400 font-black mb-6"><ArrowLeft size={20}/>返回</button>
                  <div className="bg-slate-900 text-white p-6 rounded-[2rem] mb-6">
                    <h2 className="text-lg font-black">{activeBook.name} 統計報表</h2>
                    <p className="text-2xl font-black mt-2 text-green-400">${Math.round(records.reduce((s, r) => s + calculateProfit(r), 0)).toLocaleString()}</p>
                  </div>
                  <div className="border rounded-2xl overflow-hidden">
                    <table className="w-full text-[11px] text-left">
                      <thead className="bg-slate-50 border-b">
                        <tr><th className="p-3">項目</th><th className="p-3 text-center">{activeBook.type==='sports'?'賠率':'注數'}</th><th className="p-3 text-right">盈虧</th></tr>
                      </thead>
                      <tbody>
                        {records.map(r => (
                          <tr key={r.id} className="border-b last:border-0">
                            <td className="p-3 font-bold">{r.match}</td>
                            <td className="p-3 text-center font-black text-blue-600">{activeBook.type==='sports'?r.odds:r.units}</td>
                            <td className={`p-3 text-right font-black ${calculateProfit(r) >= 0 ? 'text-green-500' : 'text-red-500'}`}>{Math.round(calculateProfit(r)).toLocaleString()}</td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                </div>
              )}
            </div>
          );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
        // 啟動圖標
        setTimeout(() => lucide.createIcons(), 500);
    </script>
</body>
</html>
