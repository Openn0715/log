<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>全方位多功能紀錄系統 V27</title>
    
    <!-- 強制載入核心依賴 -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body { -webkit-tap-highlight-color: transparent; font-family: -apple-system, sans-serif; background: #F8FAFC; }
        .input-field { width: 100%; background: #F1F5F9; border: 2px solid transparent; border-radius: 12px; font-weight: 800; color: #1E293B; outline: none; padding: 12px; transition: all 0.2s; font-size: 14px; }
        .input-field:focus { border-color: #3B82F6; background: white; box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        /* 防止解析前看到原始碼 */
        [v-cloak] { display: none; }
        #loading-screen { position: fixed; inset: 0; background: #0F172A; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; color: white; }
    </style>
</head>
<body>
    <!-- 初始載入畫面 -->
    <div id="loading-screen">
        <div style="width: 40px; height: 40px; border: 4px solid #3B82F6; border-top-color: transparent; border-radius: 50%; animate: spin 1s linear infinite;"></div>
        <p style="margin-top: 20px; font-weight: 900; letter-spacing: 2px; font-size: 12px; opacity: 0.5;">V27 SYSTEM LOADING...</p>
    </div>

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const { 
            Trash2, Plus, X, Check, Menu, FileText, ArrowLeft, TrendingUp, Loader2, Settings 
        } = lucide;

        const App = () => {
            // --- 狀態管理 ---
            const [books, setBooks] = useState(() => {
                const saved = localStorage.getItem('v27_books');
                return saved ? JSON.parse(saved) : [{ id: 'b1', name: '我的首本帳簿', type: 'sports', unitAmount: 1000 }];
            });
            const [activeId, setActiveId] = useState(() => localStorage.getItem('v27_active_id') || 'b1');
            const [records, setRecords] = useState(() => {
                const saved = localStorage.getItem(`v27_recs_${activeId}`);
                return saved ? JSON.parse(saved) : [];
            });

            const [isMenuOpen, setIsMenuOpen] = useState(false);
            const [showReport, setShowReport] = useState(false);
            const [isAddingBook, setIsAddingBook] = useState(false);
            
            const [form, setForm] = useState({
                date: new Date().toISOString().split('T')[0],
                match: '',
                odds: '',
                units: 1,
                status: 'pending'
            });

            // --- 核心邏輯 ---
            useEffect(() => {
                document.getElementById('loading-screen').style.display = 'none';
                lucide.createIcons();
            }, []);

            useEffect(() => {
                localStorage.setItem('v27_books', JSON.stringify(books));
                localStorage.setItem('v27_active_id', activeId);
            }, [books, activeId]);

            useEffect(() => {
                const saved = localStorage.getItem(`v27_recs_${activeId}`);
                setRecords(saved ? JSON.parse(saved) : []);
            }, [activeId]);

            useEffect(() => {
                localStorage.setItem(`v27_recs_${activeId}`, JSON.stringify(records));
            }, [records, activeId]);

            const currentBook = useMemo(() => 
                books.find(b => b.id === activeId) || books[0]
            , [books, activeId]);

            const calculateProfit = (r) => {
                const unit = parseFloat(currentBook.unitAmount) || 0;
                const u = parseFloat(r.units) || 0;
                if (currentBook.type === 'baccarat') return u * unit;
                if (r.status === 'pending') return 0;
                const odds = parseFloat(r.odds) || 0;
                if (r.status === 'win') return u * unit * (odds - 1);
                if (r.status === 'loss') return -(u * unit);
                return 0;
            };

            const totalProfit = records.reduce((sum, r) => sum + calculateProfit(r), 0);

            // --- 動作 ---
            const handleAddRecord = () => {
                if (!form.match && currentBook.type === 'sports') return;
                const newRec = { ...form, id: Date.now() };
                setRecords([newRec, ...records]);
                setForm({ ...form, match: '', odds: '', units: 1, status: 'pending' });
            };

            const updateUnit = (val) => {
                setBooks(books.map(b => b.id === activeId ? { ...b, unitAmount: val } : b));
            };

            // --- 渲染 UI ---
            return (
                <div className="min-h-screen pb-24">
                    {/* 導航欄 */}
                    <header className="bg-white/80 backdrop-blur-md sticky top-0 z-40 border-b p-4 flex justify-between items-center">
                        <button onClick={() => setIsMenuOpen(true)} className="p-2 text-slate-400 hover:text-slate-900">
                            <Menu size={24} />
                        </button>
                        <div className="text-center">
                            <h1 className="text-sm font-black text-slate-800">{currentBook.name}</h1>
                            <p className="text-[9px] font-black text-blue-500 uppercase tracking-widest mt-0.5">V27 System</p>
                        </div>
                        <button onClick={() => setShowReport(true)} className="p-2 bg-slate-900 text-white rounded-xl shadow-lg">
                            <FileText size={20} />
                        </button>
                    </header>

                    <main className="p-4 max-w-md mx-auto space-y-4">
                        {/* 盈虧看板 */}
                        <div className="bg-blue-600 p-6 rounded-[2.5rem] shadow-xl text-white relative overflow-hidden">
                            <div className="relative z-10 flex justify-between items-end">
                                <div>
                                    <p className="text-[10px] font-bold opacity-50 uppercase mb-1">Total Profit</p>
                                    <p className="text-3xl font-black">{Math.round(totalProfit).toLocaleString()}</p>
                                </div>
                                <div className="text-right">
                                    <p className="text-[10px] font-bold opacity-50 mb-1">單注價值</p>
                                    <input 
                                        type="number" 
                                        value={currentBook.unitAmount} 
                                        onChange={(e) => updateUnit(e.target.value)}
                                        className="bg-white/20 border border-white/20 rounded-lg w-20 px-2 py-1 text-center font-black text-xs outline-none focus:bg-white/30"
                                    />
                                </div>
                            </div>
                        </div>

                        {/* 輸入表單 */}
                        <div className="bg-white p-5 rounded-[2rem] border shadow-sm space-y-3">
                            <div className="grid grid-cols-2 gap-2">
                                <input type="date" value={form.date} onChange={e => setForm({...form, date: e.target.value})} className="input-field col-span-2" />
                                <input placeholder={currentBook.type === 'sports' ? "項目/場次" : "備註內容"} value={form.match} onChange={e => setForm({...form, match: e.target.value})} className="input-field col-span-2" />
                                {currentBook.type === 'sports' ? (
                                    <>
                                        <input type="number" step="0.01" placeholder="賠率" value={form.odds} onChange={e => setForm({...form, odds: e.target.value})} className="input-field" />
                                        <input type="number" step="0.1" placeholder="注數" value={form.units} onChange={e => setForm({...form, units: e.target.value})} className="input-field" />
                                    </>
                                ) : (
                                    <input type="number" step="0.1" placeholder="贏輸注數 (負數為輸)" value={form.units} onChange={e => setForm({...form, units: e.target.value})} className="input-field col-span-2 bg-green-50" />
                                )}
                            </div>
                            <button onClick={handleAddRecord} className="w-full bg-slate-900 text-white py-4 rounded-2xl font-black text-xs shadow-lg active:scale-[0.98] transition-all">
                                儲存紀錄
                            </button>
                        </div>

                        {/* 紀錄列表 */}
                        <div className="space-y-2">
                            {records.map(r => {
                                const p = calculateProfit(r);
                                return (
                                    <div key={r.id} className="bg-white p-4 rounded-2xl border flex items-center justify-between group transition-all">
                                        <div className="min-w-0">
                                            <p className="text-xs font-black truncate text-slate-700">{r.match || '無備註'}</p>
                                            <p className="text-[10px] font-bold text-slate-400 mt-0.5 uppercase">
                                                {r.date} | {currentBook.type === 'sports' ? `${r.odds} @ ${r.units}注` : `${r.units}注`}
                                            </p>
                                        </div>
                                        <div className="flex items-center gap-3">
                                            {currentBook.type === 'sports' && (
                                                <div className="flex gap-1">
                                                    <button onClick={() => setRecords(records.map(x => x.id === r.id ? {...x, status: 'win'} : x))} className={`p-1.5 rounded-lg ${r.status==='win' ? 'bg-green-500 text-white' : 'bg-slate-50 text-slate-300'}`}><Check size={14}/></button>
                                                    <button onClick={() => setRecords(records.map(x => x.id === r.id ? {...x, status: 'loss'} : x))} className={`p-1.5 rounded-lg ${r.status==='loss' ? 'bg-red-500 text-white' : 'bg-slate-50 text-slate-300'}`}><X size={14}/></button>
                                                </div>
                                            )}
                                            <div className={`text-sm font-black w-16 text-right ${p > 0 ? 'text-green-500' : p < 0 ? 'text-red-500' : 'text-slate-200'}`}>
                                                {Math.round(p).toLocaleString()}
                                            </div>
                                            <button onClick={() => setRecords(records.filter(x => x.id !== r.id))} className="text-slate-200 hover:text-red-400 opacity-0 group-hover:opacity-100 transition-opacity">
                                                <Trash2 size={16}/>
                                            </button>
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    </main>

                    {/* 側邊選單 */}
                    {isMenuOpen && (
                        <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-50" onClick={() => setIsMenuOpen(false)}>
                            <div className="w-72 bg-white h-full p-6 flex flex-col" onClick={e => e.stopPropagation()}>
                                <div className="flex justify-between items-center mb-8">
                                    <h3 className="font-black italic text-lg">我的帳簿</h3>
                                    <button onClick={() => setIsAddingBook(true)} className="p-2 bg-blue-600 text-white rounded-xl"><Plus size={20}/></button>
                                </div>
                                <div className="flex-1 overflow-y-auto space-y-3">
                                    {books.map(b => (
                                        <div key={b.id} onClick={() => { setActiveId(b.id); setIsMenuOpen(false); }} className={`p-4 rounded-2xl border transition-all cursor-pointer ${activeId === b.id ? 'bg-slate-900 text-white shadow-xl' : 'bg-white text-slate-400'}`}>
                                            <p className="text-sm font-black">{b.name}</p>
                                            <p className="text-[9px] font-bold mt-1 opacity-50 uppercase">{b.type}</p>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}

                    {/* 新增帳簿 Modal */}
                    {isAddingBook && (
                        <div className="fixed inset-0 z-[100] bg-slate-900/60 backdrop-blur-xl flex items-center justify-center p-6">
                            <div className="bg-white w-full max-w-xs rounded-[2.5rem] p-8 shadow-2xl space-y-6">
                                <h4 className="text-center font-black text-xl">建立新帳簿</h4>
                                <input placeholder="名稱" id="nb-name" className="input-field" />
                                <div className="grid grid-cols-2 gap-2">
                                    <button onClick={() => window.nbType = 'sports'} className="py-3 rounded-xl bg-slate-50 text-[10px] font-black focus:bg-blue-600 focus:text-white">體育模式</button>
                                    <button onClick={() => window.nbType = 'baccarat'} className="py-3 rounded-xl bg-slate-50 text-[10px] font-black focus:bg-indigo-600 focus:text-white">百家樂</button>
                                </div>
                                <button onClick={() => {
                                    const name = document.getElementById('nb-name').value;
                                    if(!name) return;
                                    const newBook = { id: 'b'+Date.now(), name, type: window.nbType || 'sports', unitAmount: 1000 };
                                    setBooks([...books, newBook]);
                                    setActiveId(newBook.id);
                                    setIsAddingBook(false);
                                    setIsMenuOpen(false);
                                }} className="w-full bg-slate-900 text-white py-4 rounded-2xl font-black">確認建立</button>
                                <button onClick={() => setIsAddingBook(false)} className="w-full text-slate-300 text-xs font-bold text-center">取消</button>
                            </div>
                        </div>
                    )}

                    {/* 報表 Modal */}
                    {showReport && (
                        <div className="fixed inset-0 bg-white z-[100] p-6 overflow-y-auto">
                            <button onClick={() => setShowReport(false)} className="flex items-center gap-2 text-slate-400 font-black mb-6">
                                <ArrowLeft size={20} /> 返回紀錄
                            </button>
                            <div className="bg-slate-900 text-white p-8 rounded-[2.5rem] mb-8 shadow-2xl">
                                <p className="text-[10px] font-black opacity-30 uppercase mb-2">Total Statistics</p>
                                <h2 className="text-2xl font-black">{currentBook.name}</h2>
                                <p className="text-4xl font-black mt-4 text-green-400">${Math.round(totalProfit).toLocaleString()}</p>
                            </div>
                            <div className="border rounded-3xl overflow-hidden shadow-sm">
                                <table className="w-full text-[11px] text-left">
                                    <thead className="bg-slate-50 border-b font-black text-slate-400">
                                        <tr><th className="p-4">項目</th><th className="p-4 text-center">數據</th><th className="p-4 text-right">損益</th></tr>
                                    </thead>
                                    <tbody>
                                        {records.map(r => (
                                            <tr key={r.id} className="border-b last:border-0">
                                                <td className="p-4 font-bold">{r.match || '-'}</td>
                                                <td className="p-4 text-center font-black text-blue-600">{currentBook.type==='sports' ? r.odds : r.units}</td>
                                                <td className={`p-4 text-right font-black ${calculateProfit(r)>=0?'text-green-500':'text-red-500'}`}>{Math.round(calculateProfit(r)).toLocaleString()}</td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
