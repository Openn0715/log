<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>全方位紀錄系統 V27 雲端穩定版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', -apple-system, system-ui, sans-serif; -webkit-tap-highlight-color: transparent; background-color: #F8FAFC; }
        .input-field { width: 100%; background: #F1F5F9; border: 2px solid transparent; border-radius: 10px; font-weight: 800; color: #1E293B; outline: none; padding: 10px 12px; transition: all 0.2s; }
        .input-field:focus { border-color: #3B82F6; background: white; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
        import { getFirestore, collection, doc, addDoc, updateDoc, deleteDoc, onSnapshot, query, serverTimestamp, getDocs } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-auth.js";

        const firebaseConfig = JSON.parse(window.__firebase_config || '{"apiKey":"","authDomain":"","projectId":"","storageBucket":"","messagingSenderId":"","appId":""}');
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'v27-cloud-system';
        const initialToken = typeof __initial_auth_token !== 'undefined' ? __initial_auth_token : null;

        let db = null;
        let auth = null;

        try {
            if (firebaseConfig.apiKey) {
                const app = initializeApp(firebaseConfig);
                db = getFirestore(app);
                auth = getAuth(app);
            }
        } catch (e) { console.error("Firebase Init Failed", e); }

        window.FB_CORE = { 
            db, auth, collection, doc, addDoc, updateDoc, deleteDoc, onSnapshot, query, getDocs,
            serverTimestamp, appId, signInAnonymously, onAuthStateChanged, signInWithCustomToken,
            initialToken, isReady: !!db
        };
        
        window.dispatchEvent(new Event('firebase-ready'));
    </script>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        const Icon = ({ name, size = 16, className = "" }) => {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [name]);
            return <i data-lucide={name} className={`${className} inline-block`} style={{width: size, height: size}}></i>;
        };

        const App = () => {
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [books, setBooks] = useState([]); 
            const [activeBookId, setActiveBookId] = useState(null);
            const [records, setRecords] = useState([]);
            const [filter, setFilter] = useState('all');
            const [form, setForm] = useState({ date: '', match: '', market: '', gap: '', odds: '', units: 1, id: null, status: 'pending' });
            const [isMenuOpen, setIsMenuOpen] = useState(false);
            const [errorMsg, setErrorMsg] = useState('');

            const getLocalDate = () => {
                const now = new Date();
                return `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`;
            };

            // 1. 初始化連線與驗證
            useEffect(() => {
                const today = getLocalDate();
                setForm(prev => ({ ...prev, date: today }));

                const fb = window.FB_CORE;
                if (!fb || !fb.auth) {
                    setLoading(false);
                    return;
                }

                const initAuth = async () => {
                    try {
                        if (fb.initialToken) {
                            await fb.signInWithCustomToken(fb.auth, fb.initialToken);
                        } else {
                            await fb.signInAnonymously(fb.auth);
                        }
                    } catch (e) {
                        console.error("Auth Fail", e);
                        setLoading(false);
                    }
                };

                initAuth();
                const unsubscribe = fb.onAuthStateChanged(fb.auth, (u) => {
                    if (u) {
                        setUser(u);
                        setLoading(false);
                    }
                });

                return () => unsubscribe();
            }, []);

            // 2. 監聽帳簿列表 (若為空則自動建立)
            useEffect(() => {
                if (!user) return;
                const fb = window.FB_CORE;
                const booksRef = fb.collection(fb.db, 'artifacts', fb.appId, 'users', user.uid, 'books');
                
                return fb.onSnapshot(booksRef, (snap) => {
                    const list = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                    setBooks(list);
                    
                    if (list.length > 0) {
                        if (!activeBookId) setActiveBookId(list[0].id);
                    } else {
                        // 自動建立第一本帳簿
                        fb.addDoc(booksRef, { 
                            name: '我的雲端紀錄', 
                            type: 'sports', 
                            unitAmount: '1000', 
                            createdAt: fb.serverTimestamp() 
                        });
                    }
                });
            }, [user]);

            // 3. 監聽目前帳簿紀錄
            useEffect(() => {
                if (!user || !activeBookId) return;
                const fb = window.FB_CORE;
                const recsRef = fb.collection(fb.db, 'artifacts', fb.appId, 'users', user.uid, 'records_' + activeBookId);
                
                return fb.onSnapshot(recsRef, (snap) => {
                    setRecords(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                });
            }, [user, activeBookId]);

            const activeBook = useMemo(() => {
                return books.find(b => b.id === activeBookId) || { name: '載入中...', type: 'sports', unitAmount: '1000' };
            }, [books, activeBookId]);

            // 計算邏輯
            const calculateProfit = (r) => {
                const unitVal = parseFloat(activeBook.unitAmount) || 0;
                const units = parseFloat(r.units) || 0;
                if (r.status === 'pending') return 0;
                const odds = parseFloat(r.odds) || 0;
                const betSize = units * unitVal;
                if (r.status === 'win') return betSize * (odds - 1);
                if (r.status === 'loss') return -betSize;
                return 0;
            };

            const filteredData = useMemo(() => {
                return records.sort((a, b) => b.date.localeCompare(a.date));
            }, [records]);

            const handleSubmit = async (e) => {
                e.preventDefault();
                setErrorMsg('');
                if (!user) { setErrorMsg('尚未連線到雲端'); return; }
                if (!activeBookId) { setErrorMsg('尚未建立紀錄簿'); return; }
                
                const fb = window.FB_CORE;
                try {
                    const colRef = fb.collection(fb.db, 'artifacts', fb.appId, 'users', user.uid, 'records_' + activeBookId);
                    await fb.addDoc(colRef, { ...form, createdAt: fb.serverTimestamp() });
                    setForm({ ...form, match: '', market: '', gap: '', odds: '', id: null, status: 'pending' });
                } catch (err) {
                    setErrorMsg('寫入失敗：' + err.message);
                }
            };

            if (loading) return (
                <div className="h-screen flex flex-col items-center justify-center bg-slate-900 text-white">
                    <div className="w-10 h-10 border-4 border-blue-500 border-t-transparent rounded-full animate-spin mb-4"></div>
                    <div className="font-black text-sm tracking-widest">雲端連線中...</div>
                </div>
            );

            return (
                <div className="min-h-screen bg-slate-50 pb-10">
                    {/* Header */}
                    <div className="bg-white border-b sticky top-0 z-30 px-4 py-3 shadow-sm">
                        <div className="max-w-md mx-auto flex justify-between items-center">
                            <button onClick={() => setIsMenuOpen(true)} className="p-2 text-slate-400"><Icon name="menu" size={24} /></button>
                            <div className="text-center flex-1 mx-4">
                                <h1 className="text-sm font-black text-slate-800 truncate">{activeBook.name}</h1>
                                <div className="text-[8px] font-black text-blue-500 uppercase tracking-widest">● CLOUD CONNECTED</div>
                            </div>
                            <div className="w-10"></div>
                        </div>
                    </div>

                    <div className="p-4 max-w-md mx-auto">
                        {/* 統計 */}
                        <div className="grid grid-cols-2 gap-2 mb-4">
                            <div className="bg-white p-4 rounded-2xl border flex flex-col items-center">
                                <span className="text-[10px] font-black text-slate-400 uppercase">總盈虧</span>
                                <span className="text-lg font-black text-blue-600">
                                    {Math.round(filteredData.reduce((s,r)=>s+calculateProfit(r),0)).toLocaleString()}
                                </span>
                            </div>
                            <div className="bg-white p-4 rounded-2xl border flex flex-col items-center">
                                <span className="text-[10px] font-black text-slate-400 uppercase">總場次</span>
                                <span className="text-lg font-black text-slate-800">{filteredData.length}</span>
                            </div>
                        </div>

                        {/* 表單 */}
                        <div className="bg-white rounded-3xl shadow-sm border p-4 mb-6">
                            <h2 className="text-[10px] font-black text-slate-400 mb-4 uppercase tracking-widest">新增雲端紀錄</h2>
                            <form className="space-y-3" onSubmit={handleSubmit}>
                                <input type="date" value={form.date} onChange={e => setForm({...form, date: e.target.value})} className="input-field text-sm" />
                                <input placeholder="項目/隊伍" value={form.match} onChange={e => setForm({...form, match: e.target.value})} className="input-field text-sm" />
                                <div className="grid grid-cols-2 gap-2">
                                    <input placeholder="盤口" value={form.market} onChange={e => setForm({...form, market: e.target.value})} className="input-field text-sm" />
                                    <input placeholder="分洞" value={form.gap} onChange={e => setForm({...form, gap: e.target.value})} className="input-field text-sm" />
                                </div>
                                <div className="grid grid-cols-2 gap-2">
                                    <input type="number" step="0.01" placeholder="賠率" value={form.odds} onChange={e => setForm({...form, odds: e.target.value})} className="input-field text-sm bg-blue-50" />
                                    <input type="number" step="0.1" placeholder="注數" value={form.units} onChange={e => setForm({...form, units: e.target.value})} className="input-field text-sm bg-blue-50" />
                                </div>
                                {errorMsg && <div className="text-[10px] text-red-500 font-bold text-center">{errorMsg}</div>}
                                <button className="w-full bg-blue-600 text-white py-4 rounded-2xl font-black text-sm shadow-lg active:scale-95 transition-transform">
                                    寫入雲端紀錄庫
                                </button>
                            </form>
                        </div>

                        {/* 列表 */}
                        <div className="space-y-2">
                            {filteredData.map(r => (
                                <div key={r.id} className="bg-white p-3 rounded-2xl border flex justify-between items-center animate-fade-in">
                                    <div>
                                        <div className="text-xs font-black text-slate-700">{r.match}</div>
                                        <div className="text-[8px] font-bold text-slate-400">{r.date} | {r.odds} @ {r.units}</div>
                                    </div>
                                    <div className="flex gap-1">
                                        <button onClick={async ()=>{
                                            const fb = window.FB_CORE;
                                            await fb.updateDoc(fb.doc(fb.db, 'artifacts', fb.appId, 'users', user.uid, 'records_'+activeBookId, r.id), {status: 'win'});
                                        }} className={`w-8 h-8 rounded-lg flex items-center justify-center ${r.status==='win'?'bg-green-500 text-white':'bg-slate-100 text-slate-300'}`}><Icon name="check" size={14}/></button>
                                        <button onClick={async ()=>{
                                            const fb = window.FB_CORE;
                                            await fb.updateDoc(fb.doc(fb.db, 'artifacts', fb.appId, 'users', user.uid, 'records_'+activeBookId, r.id), {status: 'loss'});
                                        }} className={`w-8 h-8 rounded-lg flex items-center justify-center ${r.status==='loss'?'bg-red-500 text-white':'bg-slate-100 text-slate-300'}`}><Icon name="x" size={14}/></button>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>

                    {/* 側選單 */}
                    {isMenuOpen && (
                        <div className="fixed inset-0 z-50 bg-slate-900/60 backdrop-blur-sm flex justify-start" onClick={() => setIsMenuOpen(false)}>
                            <div className="bg-white w-64 h-full p-6 shadow-2xl" onClick={e => e.stopPropagation()}>
                                <h2 className="font-black mb-6">帳簿切換</h2>
                                <div className="space-y-2">
                                    {books.map(b => (
                                        <div key={b.id} onClick={() => { setActiveBookId(b.id); setIsMenuOpen(false); }} className={`p-3 rounded-xl border cursor-pointer font-black text-xs ${activeBookId === b.id ? 'bg-blue-600 text-white' : 'text-slate-500'}`}>
                                            {b.name}
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
