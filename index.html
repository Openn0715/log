<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>全方位紀錄系統 V27 雲端版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', -apple-system, system-ui, sans-serif; -webkit-tap-highlight-color: transparent; background-color: #F8FAFC; margin: 0; }
        .input-field { width: 100%; background: #F1F5F9; border: 2px solid transparent; border-radius: 12px; font-weight: 800; color: #1E293B; outline: none; padding: 12px; transition: all 0.2s; font-size: 14px; }
        .input-field:focus { border-color: #3B82F6; background: white; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .animate-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
        import { getFirestore, collection, doc, addDoc, updateDoc, deleteDoc, onSnapshot, query, serverTimestamp, getDocs } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-auth.js";

        const firebaseConfig = JSON.parse(window.__firebase_config || '{"apiKey":"","authDomain":"","projectId":"","storageBucket":"","messagingSenderId":"","appId":""}');
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'v27-stable-system';
        const initialToken = typeof __initial_auth_token !== 'undefined' ? __initial_auth_token : null;

        let db = null, auth = null;
        try {
            if (firebaseConfig.apiKey) {
                const app = initializeApp(firebaseConfig);
                db = getFirestore(app);
                auth = getAuth(app);
            }
        } catch (e) { console.error("Firebase Init Fail", e); }

        window.FB_CORE = { 
            db, auth, collection, doc, addDoc, updateDoc, deleteDoc, onSnapshot, query, getDocs,
            serverTimestamp, appId, signInAnonymously, onAuthStateChanged, signInWithCustomToken,
            initialToken
        };
        window.dispatchEvent(new Event('firebase-ready'));
    </script>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        const Icon = ({ name, size = 18, className = "" }) => {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [name]);
            return <i data-lucide={name} className={`${className} inline-block`} style={{width: size, height: size}}></i>;
        };

        const App = () => {
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [books, setBooks] = useState([]);
            const [activeBookId, setActiveBookId] = useState(null);
            const [records, setRecords] = useState([]);
            
            // UI 狀態
            const [isMenuOpen, setIsMenuOpen] = useState(false);
            const [showReport, setShowReport] = useState(false);
            const [isAddingBook, setIsAddingBook] = useState(false);
            const [filter, setFilter] = useState('all');
            const [isEditing, setIsEditing] = useState(false);

            const getLocalDate = () => {
                const now = new Date();
                return `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`;
            };

            const [form, setForm] = useState({ date: getLocalDate(), match: '', market: '', gap: '', odds: '', units: 1, id: null, status: 'pending' });
            const [newBookForm, setNewBookForm] = useState({ name: '', type: 'sports' });

            // 1. 強制解除載入並初始化 Auth
            useEffect(() => {
                const fb = window.FB_CORE;
                if (!fb || !fb.auth) { setLoading(false); return; }

                const forceUnlock = setTimeout(() => setLoading(false), 2000);

                const initAuth = async () => {
                    try {
                        if (fb.initialToken) await fb.signInWithCustomToken(fb.auth, fb.initialToken);
                        else await fb.signInAnonymously(fb.auth);
                    } catch (e) { console.error(e); setLoading(false); }
                };

                initAuth();
                const unsubscribe = fb.onAuthStateChanged(fb.auth, (u) => {
                    if (u) {
                        setUser(u);
                        setLoading(false);
                        clearTimeout(forceUnlock);
                    }
                });

                return () => { unsubscribe(); clearTimeout(forceUnlock); };
            }, []);

            // 2. 監聽帳簿 (若無帳簿則主動建立)
            useEffect(() => {
                if (!user) return;
                const fb = window.FB_CORE;
                const booksPath = ['artifacts', fb.appId, 'users', user.uid, 'books'];
                const booksRef = fb.collection(fb.db, ...booksPath);

                const unsub = fb.onSnapshot(booksRef, (snap) => {
                    const list = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                    setBooks(list);
                    if (list.length > 0) {
                        if (!activeBookId) setActiveBookId(list[0].id);
                    } else {
                        // 真的沒帳簿時才主動建立
                        fb.addDoc(booksRef, { name: '我的第一本紀錄', type: 'sports', unitAmount: '1000', createdAt: fb.serverTimestamp() });
                    }
                }, (err) => console.error("Books Snapshot Error", err));

                return unsub;
            }, [user]);

            // 3. 監聽紀錄
            useEffect(() => {
                if (!user || !activeBookId) { setRecords([]); return; }
                const fb = window.FB_CORE;
                const recsRef = fb.collection(fb.db, 'artifacts', fb.appId, 'users', user.uid, 'records_' + activeBookId);
                
                return fb.onSnapshot(recsRef, (snap) => {
                    setRecords(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                }, (err) => console.error("Records Snapshot Error", err));
            }, [user, activeBookId]);

            const activeBook = useMemo(() => {
                return books.find(b => b.id === activeBookId) || { name: '等待資料中...', type: 'sports', unitAmount: '1000' };
            }, [books, activeBookId]);

            // 盈虧計算
            const calculateProfit = (r) => {
                const unitVal = parseFloat(activeBook.unitAmount) || 0;
                const units = parseFloat(r.units) || 0;
                if (activeBook.type === 'baccarat') return units * unitVal;
                if (r.status === 'pending') return 0;
                const odds = parseFloat(r.odds) || 0;
                const betSize = units * unitVal;
                if (r.status === 'win') return betSize * (odds - 1);
                if (r.status === 'loss') return -betSize;
                if (r.status === 'half') {
                    const gVal = parseFloat(r.gap?.toString().replace(/[^\d.-]/g, '')) || 50;
                    const isWinHalf = r.gap?.toString().includes('+') || parseFloat(r.gap) > 0;
                    return isWinHalf ? (betSize * (odds - 1)) * (Math.abs(gVal)/100) : -(betSize * (Math.abs(gVal)/100));
                }
                return 0;
            };

            const filteredData = useMemo(() => {
                return records.sort((a, b) => b.date.localeCompare(a.date));
            }, [records]);

            // 新增紀錄
            const handleSubmit = async (e) => {
                e.preventDefault();
                if (!user || !activeBookId) {
                    alert("請先選擇或建立帳簿");
                    return;
                }
                const fb = window.FB_CORE;
                try {
                    const colRef = fb.collection(fb.db, 'artifacts', fb.appId, 'users', user.uid, 'records_' + activeBookId);
                    if (isEditing && form.id) {
                        const { id, ...data } = form;
                        await fb.updateDoc(fb.doc(fb.db, 'artifacts', fb.appId, 'users', user.uid, 'records_' + activeBookId, id), data);
                    } else {
                        await fb.addDoc(colRef, { ...form, createdAt: fb.serverTimestamp() });
                    }
                    setForm({ date: getLocalDate(), match: '', market: '', gap: '', odds: '', units: 1, id: null, status: 'pending' });
                    setIsEditing(false);
                } catch (err) { alert("儲存失敗：" + err.message); }
            };

            // 新增帳簿
            const handleAddBook = async () => {
                if (!newBookForm.name || !user) return;
                const fb = window.FB_CORE;
                try {
                    const booksRef = fb.collection(fb.db, 'artifacts', fb.appId, 'users', user.uid, 'books');
                    await fb.addDoc(booksRef, {
                        name: newBookForm.name,
                        type: newBookForm.type,
                        unitAmount: '1000',
                        createdAt: fb.serverTimestamp()
                    });
                    setIsAddingBook(false);
                    setIsMenuOpen(false);
                    setNewBookForm({ name: '', type: 'sports' });
                } catch (err) { alert("建立帳簿失敗"); }
            };

            if (loading) return (
                <div className="h-screen flex flex-col items-center justify-center bg-slate-900 text-white">
                    <div className="w-10 h-10 border-4 border-blue-500 border-t-transparent rounded-full animate-spin mb-4"></div>
                    <div className="font-black italic">CONNECTING CLOUD...</div>
                </div>
            );

            return (
                <div className="min-h-screen bg-slate-50 pb-20 animate-in">
                    {/* Header */}
                    <div className="bg-white border-b sticky top-0 z-40 px-4 py-3 shadow-sm">
                        <div className="max-w-md mx-auto flex justify-between items-center">
                            <button onClick={() => setIsMenuOpen(true)} className="p-2 text-slate-400"><Icon name="menu" /></button>
                            <div className="text-center flex-1">
                                <h1 className="text-sm font-black text-slate-800 truncate px-4">{activeBook.name}</h1>
                                <div className="text-[8px] font-black text-blue-500 tracking-widest uppercase">● Cloud Synced</div>
                            </div>
                            <button onClick={() => setShowReport(true)} className="p-2 text-slate-900"><Icon name="bar-chart-2" /></button>
                        </div>
                    </div>

                    <div className="p-4 max-w-md mx-auto space-y-4">
                        {/* 統計概覽 */}
                        <div className="grid grid-cols-2 gap-3">
                            <div className="bg-white p-4 rounded-3xl border shadow-sm text-center">
                                <div className="text-[10px] font-black text-slate-400 uppercase mb-1">本簿盈虧</div>
                                <div className={`text-xl font-black ${filteredData.reduce((s,r)=>s+calculateProfit(r),0)>=0?'text-green-500':'text-red-500'}`}>
                                    {Math.round(filteredData.reduce((s,r)=>s+calculateProfit(r),0)).toLocaleString()}
                                </div>
                            </div>
                            <div className="bg-white p-4 rounded-3xl border shadow-sm text-center">
                                <div className="text-[10px] font-black text-slate-400 uppercase mb-1">總場次</div>
                                <div className="text-xl font-black text-slate-800">{filteredData.length}</div>
                            </div>
                        </div>

                        {/* 單注金額 */}
                        <div className="bg-blue-600 p-4 rounded-3xl shadow-lg flex justify-between items-center text-white">
                            <div className="flex items-center gap-3">
                                <Icon name="wallet" />
                                <span className="text-xs font-black">單注金額設定</span>
                            </div>
                            <div className="flex items-center bg-white/20 rounded-xl px-3 py-1">
                                <span className="text-[10px] mr-1">$</span>
                                <input type="number" value={activeBook.unitAmount} onChange={async (e) => {
                                    const fb = window.FB_CORE;
                                    await fb.updateDoc(fb.doc(fb.db, 'artifacts', fb.appId, 'users', user.uid, 'books', activeBookId), { unitAmount: e.target.value });
                                }} className="bg-transparent w-16 text-right font-black outline-none text-sm" />
                            </div>
                        </div>

                        {/* 輸入表單 */}
                        <div className="bg-white p-6 rounded-[2.5rem] border shadow-sm">
                            <h2 className="text-[10px] font-black text-slate-300 mb-4 uppercase tracking-widest">{isEditing ? '編輯紀錄' : '新增紀錄'}</h2>
                            <form className="space-y-3" onSubmit={handleSubmit}>
                                <input type="date" value={form.date} onChange={e => setForm({...form, date: e.target.value})} className="input-field" />
                                <input placeholder="比賽項目 / 備註" value={form.match} onChange={e => setForm({...form, match: e.target.value})} className="input-field" required />
                                {activeBook.type === 'sports' ? (
                                    <>
                                        <div className="grid grid-cols-2 gap-2">
                                            <input placeholder="盤口 (讓分)" value={form.market} onChange={e => setForm({...form, market: e.target.value})} className="input-field" />
                                            <input placeholder="分洞 (-3.5)" value={form.gap} onChange={e => setForm({...form, gap: e.target.value})} className="input-field" />
                                        </div>
                                        <div className="grid grid-cols-2 gap-2">
                                            <input type="number" step="0.01" placeholder="賠率" value={form.odds} onChange={e => setForm({...form, odds: e.target.value})} className="input-field bg-blue-50" required />
                                            <input type="number" step="0.1" placeholder="注數" value={form.units} onChange={e => setForm({...form, units: e.target.value})} className="input-field bg-indigo-50" required />
                                        </div>
                                    </>
                                ) : (
                                    <input type="number" step="0.01" placeholder="盈虧注數 (負數為輸)" value={form.units} onChange={e => setForm({...form, units: e.target.value})} className="input-field bg-green-50" required />
                                )}
                                <button className={`w-full py-4 rounded-2xl text-white font-black text-sm shadow-lg ${isEditing ? 'bg-orange-500' : 'bg-slate-900'}`}>
                                    {isEditing ? '更新紀錄' : '寫入雲端'}
                                </button>
                            </form>
                        </div>

                        {/* 列表 */}
                        <div className="space-y-2">
                            {filteredData.map(r => {
                                const p = calculateProfit(r);
                                return (
                                    <div key={r.id} className="bg-white p-4 rounded-2xl border shadow-sm flex justify-between items-center group relative overflow-hidden">
                                        <div className="flex-1">
                                            <div className="text-xs font-black text-slate-800">{r.match}</div>
                                            <div className="text-[9px] font-bold text-slate-400 uppercase tracking-tighter">
                                                {r.date} | {activeBook.type==='sports' ? `@${r.odds} / ${r.units}注` : `${r.units}注`}
                                            </div>
                                        </div>
                                        <div className="text-right flex items-center gap-3">
                                            <div className={`text-xs font-black ${p>0?'text-green-500':p<0?'text-red-500':'text-slate-300'}`}>
                                                {p!==0 ? (p>0?'+':'')+Math.round(p).toLocaleString() : 'PENDING'}
                                            </div>
                                            {activeBook.type === 'sports' && (
                                                <div className="flex gap-1">
                                                    <button onClick={()=>handleStatus(r.id, 'win')} className={`w-7 h-7 rounded-lg flex items-center justify-center ${r.status==='win'?'bg-green-500 text-white':'bg-slate-50 text-slate-200'}`}><Icon name="check" size={12}/></button>
                                                    <button onClick={()=>handleStatus(r.id, 'loss')} className={`w-7 h-7 rounded-lg flex items-center justify-center ${r.status==='loss'?'bg-red-500 text-white':'bg-slate-50 text-slate-200'}`}><Icon name="x" size={12}/></button>
                                                </div>
                                            )}
                                        </div>
                                        <div className="absolute right-0 top-0 h-full flex opacity-0 group-hover:opacity-100 transition-opacity">
                                            <button onClick={()=>{setForm(r); setIsEditing(true); window.scrollTo(0,0);}} className="bg-blue-500 text-white px-3"><Icon name="edit-3" size={12}/></button>
                                            <button onClick={async ()=>{ if(confirm("刪除？")) await window.FB_CORE.deleteDoc(window.FB_CORE.doc(window.FB_CORE.db, 'artifacts', window.FB_CORE.appId, 'users', user.uid, 'records_'+activeBookId, r.id)); }} className="bg-red-500 text-white px-3"><Icon name="trash-2" size={12}/></button>
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    </div>

                    {/* 側選單 */}
                    {isMenuOpen && (
                        <div className="fixed inset-0 bg-slate-900/60 z-50 backdrop-blur-sm flex justify-start" onClick={() => setIsMenuOpen(false)}>
                            <div className="bg-white w-72 h-full p-6 flex flex-col shadow-2xl animate-in" onClick={e => e.stopPropagation()}>
                                <h2 className="font-black text-xl mb-6 flex items-center gap-2 italic"><Icon name="cloud" className="text-blue-500"/> Cloud Books</h2>
                                <div className="flex-1 space-y-2 overflow-y-auto no-scrollbar">
                                    {books.map(b => (
                                        <div key={b.id} onClick={() => { setActiveBookId(b.id); setIsMenuOpen(false); }} className={`p-4 rounded-2xl border-2 transition-all cursor-pointer ${activeBookId === b.id ? 'border-blue-500 bg-blue-50 text-blue-700' : 'border-slate-50 text-slate-400 hover:border-slate-200'}`}>
                                            <div className="font-black text-sm">{b.name}</div>
                                            <div className="text-[9px] uppercase font-bold opacity-60">{b.type}</div>
                                        </div>
                                    ))}
                                    <button onClick={() => setIsAddingBook(true)} className="w-full py-4 border-2 border-dashed rounded-2xl text-slate-300 font-black text-[10px] uppercase hover:bg-slate-50">+ Add New Book</button>
                                </div>
                                <div className="pt-6 border-t mt-auto text-[9px] font-bold text-slate-300">UID: {user?.uid}</div>
                            </div>
                        </div>
                    )}

                    {/* 新增帳簿視窗 */}
                    {isAddingBook && (
                        <div className="fixed inset-0 bg-slate-900/80 z-[60] flex items-center justify-center p-6 backdrop-blur-md">
                            <div className="bg-white w-full max-w-xs rounded-[2rem] p-8 shadow-2xl animate-in">
                                <h3 className="text-lg font-black mb-4 text-center">建立新帳簿</h3>
                                <div className="space-y-4">
                                    <input value={newBookForm.name} onChange={e => setNewBookForm({...newBookForm, name: e.target.value})} className="input-field text-center" placeholder="輸入名稱" />
                                    <div className="grid grid-cols-2 gap-2">
                                        <button onClick={()=>setNewBookForm({...newBookForm, type:'sports'})} className={`py-3 rounded-xl text-[10px] font-black ${newBookForm.type==='sports'?'bg-blue-600 text-white':'bg-slate-100 text-slate-400'}`}>體育博彩</button>
                                        <button onClick={()=>setNewBookForm({...newBookForm, type:'baccarat'})} className={`py-3 rounded-xl text-[10px] font-black ${newBookForm.type==='baccarat'?'bg-indigo-600 text-white':'bg-slate-100 text-slate-400'}`}>百家樂</button>
                                    </div>
                                    <button onClick={handleAddBook} className="w-full py-4 bg-slate-900 text-white rounded-2xl font-black text-sm shadow-lg">建立</button>
                                    <button onClick={()=>setIsAddingBook(false)} className="w-full text-slate-400 text-[10px] font-black uppercase">取消</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* 報表系統 */}
                    {showReport && (
                        <div className="fixed inset-0 bg-white z-[100] overflow-y-auto p-6 no-scrollbar">
                            <button onClick={()=>setShowReport(false)} className="mb-6 flex items-center gap-2 text-slate-400 font-black"><Icon name="arrow-left"/> 返回紀錄</button>
                            <div className="bg-slate-900 text-white p-8 rounded-[2.5rem] mb-6">
                                <div className="text-[10px] font-black text-blue-400 uppercase tracking-widest mb-1">Performance Report</div>
                                <h2 className="text-xl font-black mb-6">{activeBook.name}</h2>
                                <div className="grid grid-cols-2 gap-4">
                                    <div className="bg-white/5 p-4 rounded-2xl">
                                        <div className="text-[8px] opacity-40 uppercase mb-1">Total Profit</div>
                                        <div className="text-xl font-black">${Math.round(filteredData.reduce((s,r)=>s+calculateProfit(r),0)).toLocaleString()}</div>
                                    </div>
                                    <div className="bg-white/5 p-4 rounded-2xl">
                                        <div className="text-[8px] opacity-40 uppercase mb-1">Total Win %</div>
                                        <div className="text-xl font-black text-yellow-400">
                                            {filteredData.length > 0 ? (filteredData.filter(r=>calculateProfit(r)>0).length/filteredData.length*100).toFixed(1) : 0}%
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
