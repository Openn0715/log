<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>全方位紀錄系統 V27 雲端版</title>
    <!-- 基礎套件載入 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', -apple-system, system-ui, sans-serif; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; background-color: #F8FAFC; }
        .input-field { width: 100%; background: #F1F5F9; border: 2px solid transparent; border-radius: 10px; font-weight: 800; color: #1E293B; outline: none; padding: 8px 12px; transition: all 0.2s; }
        .input-field:focus { border-color: #3B82F6; background: white; }
        .scale-in-center { animation: scale-in-center 0.2s cubic-bezier(0.250, 0.460, 0.450, 0.940) both; }
        @keyframes scale-in-center { 0% { transform: scale(0.95); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- Firebase 模組化載入 -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
        import { getFirestore, collection, doc, addDoc, updateDoc, deleteDoc, onSnapshot, query, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-auth.js";

        // 環境參數初始化
        const firebaseConfig = JSON.parse(window.__firebase_config || '{"apiKey":"","authDomain":"","projectId":"","storageBucket":"","messagingSenderId":"","appId":""}');
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'v27-cloud-system';
        const initialToken = typeof __initial_auth_token !== 'undefined' ? __initial_auth_token : null;

        // 全域工具掛載
        window.FB_CORE = { 
            db, auth, collection, doc, addDoc, updateDoc, deleteDoc, onSnapshot, query, 
            serverTimestamp, appId, signInAnonymously, onAuthStateChanged, signInWithCustomToken,
            initialToken
        };
        
        // 觸發 React 渲染
        window.dispatchEvent(new Event('firebase-ready'));
    </script>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // Lucide 圖示適配器
        const Icon = ({ name, size = 16, className = "", strokeWidth = 3 }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons({
                        attrs: { size, class: className, 'stroke-width': strokeWidth },
                        nameAttr: 'data-lucide'
                    });
                }
            }, [name, size, className, strokeWidth]);
            return <i data-lucide={name} ref={iconRef} className="inline-block flex items-center justify-center"></i>;
        };

        const App = () => {
            const [fbReady, setFbReady] = useState(false);
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);

            // V27 原始狀態
            const [isMenuOpen, setIsMenuOpen] = useState(false);
            const [showReport, setShowReport] = useState(false);
            const [isAddingBook, setIsAddingBook] = useState(false);
            const [books, setBooks] = useState([]); 
            const [activeBookId, setActiveBookId] = useState(null);
            const [records, setRecords] = useState([]);
            const [filter, setFilter] = useState('all');
            const [customRange, setCustomRange] = useState({ start: '', end: '' });
            const [editingBookId, setEditingBookId] = useState(null);
            const [tempBookName, setTempBookName] = useState('');
            const [form, setForm] = useState({ date: '', match: '', market: '', gap: '', odds: '', units: 1, id: null, status: 'pending' });
            const [newBookForm, setNewBookForm] = useState({ name: '', type: 'sports' });
            const [isEditing, setIsEditing] = useState(false);
            const [deletingId, setDeletingId] = useState(null);

            const getLocalDate = () => {
                const now = new Date();
                return `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`;
            };

            // 監聽 Firebase Ready
            useEffect(() => {
                const handleReady = () => setFbReady(true);
                if (window.FB_CORE) handleReady();
                window.addEventListener('firebase-ready', handleReady);
                
                // 初始化日期
                const today = getLocalDate();
                setCustomRange({ start: today, end: today });
                setForm(prev => ({ ...prev, date: today }));

                return () => window.removeEventListener('firebase-ready', handleReady);
            }, []);

            // 處理登入與 Auth 狀態
            useEffect(() => {
                if (!fbReady) return;
                const fb = window.FB_CORE;
                
                const initAuth = async () => {
                    try {
                        if (fb.initialToken) {
                            await fb.signInWithCustomToken(fb.auth, fb.initialToken);
                        } else {
                            await fb.signInAnonymously(fb.auth);
                        }
                    } catch (e) { console.error("Auth Error", e); }
                };

                initAuth();
                const unsubscribe = fb.onAuthStateChanged(fb.auth, (u) => {
                    if (u) setUser(u);
                });
                return () => unsubscribe();
            }, [fbReady]);

            // 讀取帳簿清單
            useEffect(() => {
                if (!user) return;
                const fb = window.FB_CORE;
                const booksRef = fb.collection(fb.db, 'artifacts', fb.appId, 'users', user.uid, 'books');
                
                return fb.onSnapshot(booksRef, (snap) => {
                    const list = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                    setBooks(list);
                    if (list.length > 0 && !activeBookId) setActiveBookId(list[0].id);
                    // 預設帳簿創建
                    if (list.length === 0) {
                        fb.addDoc(booksRef, { name: '我的體育紀錄', type: 'sports', unitAmount: '1000', createdAt: fb.serverTimestamp() });
                    }
                    setLoading(false);
                }, (err) => setLoading(false));
            }, [user]);

            // 讀取該帳簿紀錄
            useEffect(() => {
                if (!user || !activeBookId) return;
                const fb = window.FB_CORE;
                const recsRef = fb.collection(fb.db, 'artifacts', fb.appId, 'users', user.uid, 'records_' + activeBookId);
                
                return fb.onSnapshot(recsRef, (snap) => {
                    setRecords(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                }, (err) => console.error(err));
            }, [user, activeBookId]);

            // 計算邏輯 (V27 原始)
            const activeBook = books.find(b => b.id === activeBookId) || { name: '載入中...', type: 'sports', unitAmount: '1000' };

            const calculateRecordProfit = (r) => {
                const unitVal = parseFloat(activeBook.unitAmount) || 0;
                const units = parseFloat(r.units) || 0;
                if (activeBook.type === 'baccarat') return units * unitVal;
                if (r.status === 'pending') return 0;
                const odds = parseFloat(r.odds) || 0;
                const betSize = units * unitVal;
                if (r.status === 'win') return betSize * (odds - 1);
                if (r.status === 'loss') return -betSize;
                if (r.status === 'push') return 0; 
                if (r.status === 'half') {
                    const gVal = parseFloat(r.gap?.toString().replace(/[^\d.-]/g, '')) || 50;
                    const isWinHalf = r.gap?.toString().includes('+') || parseFloat(r.gap) > 0;
                    return isWinHalf ? (betSize * (odds - 1)) * (Math.abs(gVal)/100) : -(betSize * (Math.abs(gVal)/100));
                }
                return 0;
            };

            const filteredData = useMemo(() => {
                return records.filter(r => {
                    const today = getLocalDate();
                    if (filter === 'all') return true;
                    if (filter === 'today') return r.date === today;
                    if (filter === 'month') return r.date.substring(0, 7) === today.substring(0, 7);
                    if (filter === 'custom') return r.date >= customRange.start && r.date <= customRange.end;
                    return true;
                }).sort((a, b) => b.date.localeCompare(a.date));
            }, [records, filter, customRange]);

            const totalProfitSum = filteredData.reduce((s, r) => s + calculateRecordProfit(r), 0);
            const winCount = filteredData.filter(r => calculateRecordProfit(r) > 0).length;
            const lossCount = filteredData.filter(r => calculateRecordProfit(r) < 0).length;
            const totalSettled = winCount + lossCount;
            const winRate = totalSettled > 0 ? ((winCount / totalSettled) * 100).toFixed(1) : "0.0";
            const groupedData = filteredData.reduce((groups, record) => {
                const date = record.date;
                if (!groups[date]) groups[date] = [];
                groups[date].push(record);
                return groups;
            }, {});

            // 操作函數
            const handleUnitAmountChange = async (newVal) => {
                const fb = window.FB_CORE;
                const docRef = fb.doc(fb.db, 'artifacts', fb.appId, 'users', user.uid, 'books', activeBookId);
                await fb.updateDoc(docRef, { unitAmount: newVal });
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                const fb = window.FB_CORE;
                if (activeBook.type === 'sports' && (!form.match || !form.odds)) return;
                const colRef = fb.collection(fb.db, 'artifacts', fb.appId, 'users', user.uid, 'records_' + activeBookId);
                
                if (isEditing && form.id) {
                    const docRef = fb.doc(fb.db, 'artifacts', fb.appId, 'users', user.uid, 'records_' + activeBookId, form.id);
                    const { id, ...saveData } = form;
                    await fb.updateDoc(docRef, saveData);
                } else {
                    await fb.addDoc(colRef, { ...form, createdAt: fb.serverTimestamp() });
                }
                setForm({ date: getLocalDate(), match: '', market: '', gap: '', odds: '', units: 1, id: null, status: 'pending' });
                setIsEditing(false);
            };

            const updateStatus = async (rid, newStatus) => {
                const fb = window.FB_CORE;
                const docRef = fb.doc(fb.db, 'artifacts', fb.appId, 'users', user.uid, 'records_' + activeBookId, rid);
                await fb.updateDoc(docRef, { status: newStatus });
            };

            // 頁面渲染部分 (保持 V27 UI)
            if (loading || !fbReady) return <div className="h-screen flex items-center justify-center bg-slate-900 text-white font-black italic animate-pulse">V27 CLOUD CONNECTING...</div>;

            return (
                <div className="min-h-screen pb-24 text-slate-800">
                    {/* 報表彈窗 */}
                    {showReport && (
                        <div className="fixed inset-0 bg-white z-[100] overflow-y-auto">
                            <div className="max-w-lg mx-auto p-4 pb-24">
                                <button onClick={() => setShowReport(false)} className="flex items-center gap-2 text-slate-500 font-black mb-4"><Icon name="arrow-left" size={20} /> 返回</button>
                                <div className="bg-slate-900 text-white p-5 rounded-[1.5rem] shadow-2xl mb-6">
                                    <h2 className="text-lg font-black">{activeBook.name}</h2>
                                    <div className="grid grid-cols-4 gap-1 pt-3 border-t border-white/10 text-center mt-3">
                                        <div className="text-center"><div className="text-[7px] font-black opacity-40 uppercase">盈虧</div><div className={`text-[11px] font-black ${totalProfitSum>=0?'text-green-400':'text-red-400'}`}>{Math.round(totalProfitSum).toLocaleString()}</div></div>
                                        <div className="text-center"><div className="text-[7px] font-black opacity-40 uppercase">勝率</div><div className="text-[11px] font-black text-yellow-400">{winRate}%</div></div>
                                        <div className="text-center"><div className="text-[7px] font-black opacity-40 uppercase">勝場</div><div className="text-[11px] font-black text-green-400">{winCount}</div></div>
                                        <div className="text-center"><div className="text-[7px] font-black opacity-40 uppercase">敗場</div><div className="text-[11px] font-black text-red-400">{lossCount}</div></div>
                                    </div>
                                </div>
                                <div className="space-y-4">
                                    {Object.entries(groupedData).map(([date, items]) => (
                                        <div key={date}>
                                            <span className="text-[9px] font-black text-slate-400 px-2 py-0.5 bg-slate-50 rounded-full mb-1 inline-block">{date}</span>
                                            <div className="overflow-hidden border rounded-xl bg-white shadow-sm">
                                                <table className="w-full text-left text-[10px]">
                                                    <thead className="bg-slate-50 text-slate-400 font-black text-[8px] border-b">
                                                        <tr><th className="px-3 py-1.5">內容</th><th className="text-center">賠/注</th><th className="text-center">結果</th><th className="text-right px-3">盈虧</th></tr>
                                                    </thead>
                                                    <tbody>
                                                        {items.map(r => {
                                                            const p = calculateRecordProfit(r);
                                                            return (
                                                                <tr key={r.id} className="border-b last:border-0 font-bold">
                                                                    <td className="px-3 py-1.5 truncate max-w-[100px]">{r.match}</td>
                                                                    <td className="text-center text-blue-600">{activeBook.type==='sports'?r.odds:r.units}</td>
                                                                    <td className={`text-center font-black ${p>0?'text-green-500':p<0?'text-red-500':'text-slate-300'}`}>{activeBook.type==='baccarat'?(r.units>0?'贏':'輸'):(r.status)}</td>
                                                                    <td className={`text-right px-3 font-black ${p>0?'text-green-500':'text-red-500'}`}>{Math.round(p).toLocaleString()}</td>
                                                                </tr>
                                                            );
                                                        })}
                                                    </tbody>
                                                </table>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}

                    {/* 側選單 */}
                    {isMenuOpen && <div className="fixed inset-0 bg-slate-900/60 z-50 backdrop-blur-sm" onClick={() => { setIsMenuOpen(false); setEditingBookId(null); }}></div>}
                    <div className={`fixed top-0 left-0 h-full w-72 bg-white z-[60] shadow-2xl transition-transform duration-300 ${isMenuOpen ? 'translate-x-0' : '-translate-x-full'}`}>
                        <div className="p-6 h-full flex flex-col">
                            <div className="flex justify-between items-center mb-8">
                                <h2 className="font-black italic text-lg">紀錄簿列表</h2>
                                <button onClick={() => setIsAddingBook(true)} className="p-2 bg-blue-600 text-white rounded-xl shadow-lg active:scale-90 transition-transform"><Icon name="plus" size={20} /></button>
                            </div>
                            <div className="space-y-3 flex-1 overflow-y-auto">
                                {books.map(b => (
                                    <div key={b.id} onClick={() => { setActiveBookId(b.id); setIsMenuOpen(false); }} className={`group p-4 rounded-2xl cursor-pointer transition-all border ${activeBookId === b.id ? 'bg-blue-600 border-blue-600 text-white shadow-xl' : 'bg-white border-slate-100 text-slate-400'}`}>
                                        <div className="flex justify-between items-center">
                                            <div><span className="font-black text-sm block">{b.name}</span><span className="text-[8px] font-black uppercase opacity-60">{b.type==='sports'?'體育':'百家樂'}</span></div>
                                            <button onClick={(e) => { e.stopPropagation(); if(confirm("確定刪除？")) window.FB_CORE.deleteDoc(window.FB_CORE.doc(window.FB_CORE.db, 'artifacts', window.FB_CORE.appId, 'users', user.uid, 'books', b.id)); }} className="opacity-0 group-hover:opacity-100 p-1"><Icon name="trash-2" size={14} /></button>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>

                    {/* 頂部導航 */}
                    <div className="bg-white border-b sticky top-0 z-40 px-4 pt-3 pb-2 shadow-sm">
                        <div className="max-w-lg mx-auto">
                            <div className="flex justify-between items-center mb-3">
                                <button onClick={() => setIsMenuOpen(true)} className="p-2 text-slate-400"><Icon name="menu" size={24} /></button>
                                <div className="text-center min-w-0 px-4">
                                    <h1 className="text-xs font-black text-slate-800 truncate">{activeBook.name}</h1>
                                    <div className="text-[7px] font-black text-blue-500 uppercase tracking-tighter">【 CLOUD SYNCED 】</div>
                                </div>
                                <button onClick={() => setShowReport(true)} className="p-2 bg-slate-800 text-white rounded-xl shadow-lg"><Icon name="file-text" size={18} /></button>
                            </div>
                            <div className="grid grid-cols-4 gap-1.5">
                                <div className="bg-slate-50 p-2 rounded-xl border border-slate-100 flex flex-col items-center">
                                    <div className="text-[6px] text-slate-400 font-black mb-0.5 uppercase tracking-tighter">盈虧</div>
                                    <div className={`text-[10px] font-black truncate ${totalProfitSum>=0?'text-green-600':'text-red-600'}`}>{Math.round(totalProfitSum).toLocaleString()}</div>
                                </div>
                                <div className="bg-slate-50 p-2 rounded-xl border border-slate-100 flex flex-col items-center">
                                    <div className="text-[6px] text-slate-400 font-black mb-0.5 uppercase tracking-tighter">勝率</div>
                                    <div className="text-[10px] font-black text-blue-600">{winRate}%</div>
                                </div>
                                <div className="bg-slate-50 p-2 rounded-xl border border-slate-100 flex flex-col items-center">
                                    <div className="text-[6px] text-slate-400 font-black mb-0.5 uppercase tracking-tighter">勝 / 敗</div>
                                    <div className="text-[10px] font-black flex gap-1"><span className="text-green-600">{winCount}</span><span className="text-slate-300">/</span><span className="text-red-600">{lossCount}</span></div>
                                </div>
                                <div className="bg-slate-50 p-2 rounded-xl border border-slate-100 flex flex-col items-center">
                                    <div className="text-[6px] text-slate-400 font-black mb-0.5 uppercase tracking-tighter">總場次</div>
                                    <div className="text-[10px] font-black">{filteredData.length}</div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div className="p-4 max-w-lg mx-auto">
                        <div className="flex gap-1 bg-white p-1 rounded-2xl border mb-3 shadow-sm">
                            {['all', 'today', 'month', 'custom'].map(f => (
                                <button key={f} onClick={() => setFilter(f)} className={`flex-1 py-1.5 rounded-xl text-[10px] font-black transition-all ${filter === f ? 'bg-slate-800 text-white shadow-md' : 'text-slate-400'}`}>{f==='all'?'全部':f==='today'?'今日':f==='month'?'本月':'自定義'}</button>
                            ))}
                        </div>

                        {filter === 'custom' && (
                            <div className="bg-white p-3 rounded-2xl border mb-3 flex gap-2 items-center scale-in-center">
                                <input type="date" value={customRange.start} onChange={e => setCustomRange({...customRange, start: e.target.value})} className="flex-1 bg-slate-50 p-2 rounded-xl text-[10px] font-black outline-none" />
                                <span className="text-slate-300 text-[10px] font-bold">至</span>
                                <input type="date" value={customRange.end} onChange={e => setCustomRange({...customRange, end: e.target.value})} className="flex-1 bg-slate-50 p-2 rounded-xl text-[10px] font-black outline-none" />
                            </div>
                        )}

                        <div className="mb-4 bg-blue-600 p-3 rounded-2xl flex items-center justify-between shadow-lg">
                           <div className="flex items-center gap-2"><Icon name="trending-up" size={16} className="text-blue-200" /><span className="text-[11px] font-black text-white">單注金額：</span></div>
                           <div className="flex items-center bg-white/20 backdrop-blur-md rounded-xl px-3 py-1.5 border border-white/20">
                              <span className="text-blue-100 text-[10px] font-black mr-2">$</span>
                              <input type="number" value={activeBook.unitAmount || '1000'} onChange={e => handleUnitAmountChange(e.target.value)} className="bg-transparent text-white font-black text-sm outline-none w-20 text-center" />
                           </div>
                        </div>

                        {/* 輸入表單 */}
                        <div className="bg-white rounded-[1.5rem] shadow-sm border border-slate-100 overflow-hidden mb-6">
                            <form className="p-4 grid grid-cols-12 gap-2" onSubmit={handleSubmit}>
                                <div className="col-span-12"><input type="date" value={form.date} onChange={e => setForm({ ...form, date: e.target.value })} className="input-field text-[11px]" /></div>
                                <div className="col-span-12"><input value={form.match} onChange={e => setForm({ ...form, match: e.target.value })} className="input-field text-[11px]" placeholder={activeBook.type === 'sports' ? "項目/對戰" : "備註/局數"} /></div>
                                {activeBook.type === 'sports' ? (
                                    <>
                                        <div className="col-span-6"><input value={form.market} onChange={e => setForm({ ...form, market: e.target.value })} className="input-field text-[11px]" placeholder="盤口" /></div>
                                        <div className="col-span-6"><input value={form.gap} onChange={e => setForm({ ...form, gap: e.target.value })} className="input-field text-[11px]" placeholder="分洞" /></div>
                                        <div className="col-span-6"><input type="number" step="0.01" value={form.odds} onChange={e => setForm({ ...form, odds: e.target.value })} className="input-field text-[11px] text-center bg-blue-50/50" placeholder="賠率" /></div>
                                        <div className="col-span-6"><input type="number" step="0.1" value={form.units} onChange={e => setForm({ ...form, units: e.target.value })} className="input-field text-[11px] text-center bg-blue-50/50" placeholder="注數" /></div>
                                    </>
                                ) : (
                                    <div className="col-span-12"><input type="number" step="0.01" value={form.units} onChange={e => setForm({ ...form, units: e.target.value })} className="input-field text-[11px] text-center bg-green-50/50 font-black" placeholder="贏輸注數 (負號為輸)" /></div>
                                )}
                                <button type="submit" className={`col-span-12 py-3 rounded-xl text-white font-black text-xs shadow-md mt-1 ${isEditing ? 'bg-orange-500' : 'bg-blue-600'}`}>
                                   {isEditing ? '更新內容' : '寫入雲端紀錄'}
                                </button>
                                {isEditing && <button type="button" onClick={()=>{setIsEditing(false); setForm({ date: getLocalDate(), match: '', market: '', gap: '', odds: '', units: 1, id: null, status: 'pending' });}} className="col-span-12 text-[10px] font-black text-slate-400 py-1 uppercase underline">取消編輯</button>}
                            </form>
                        </div>

                        {/* 列表渲染 */}
                        <div className="space-y-4">
                            {Object.entries(groupedData).map(([date, dayRecords]) => (
                                <div key={date}>
                                    <div className="sticky top-[155px] z-10 mb-1.5"><span className="bg-slate-900 text-white text-[7px] font-black px-2 py-0.5 rounded-full shadow-sm">{date.replace(/-/g, '/')}</span></div>
                                    <div className="space-y-1">
                                        {dayRecords.map(r => {
                                            const profit = calculateRecordProfit(r);
                                            return (
                                                <div key={r.id} className="bg-white px-2 py-1.5 rounded-xl shadow-sm border border-slate-50 flex items-center gap-2 relative group scale-in-center">
                                                    <div className={`w-0.5 h-5 rounded-full shrink-0 ${activeBook.type === 'sports' && r.status === 'pending' ? 'bg-slate-100' : profit > 0 ? 'bg-green-500' : profit < 0 ? 'bg-red-500' : 'bg-orange-400'}`}></div>
                                                    <div className="flex-1 min-w-0">
                                                        <h3 className="text-[10px] font-black text-slate-700 truncate">{r.match || '無標題'}</h3>
                                                        <div className="text-[7px] font-bold text-slate-400 tracking-tighter">{activeBook.type==='sports'?`${r.odds}@${r.units}注 | ${r.market} ${r.gap}`:`${r.units}注`}</div>
                                                    </div>
                                                    {activeBook.type === 'sports' && (
                                                        <div className="flex gap-0.5 shrink-0">
                                                            <button onClick={()=>updateStatus(r.id, 'win')} className={`w-6 h-6 rounded flex items-center justify-center transition-all ${r.status==='win'?'bg-green-500 text-white shadow-sm':'bg-slate-50 text-slate-300'}`}><Icon name="check" size={10} strokeWidth={4}/></button>
                                                            <button onClick={()=>updateStatus(r.id, 'loss')} className={`w-6 h-6 rounded flex items-center justify-center transition-all ${r.status==='loss'?'bg-red-500 text-white shadow-sm':'bg-slate-50 text-slate-300'}`}><Icon name="x" size={10} strokeWidth={4}/></button>
                                                            <button onClick={()=>updateStatus(r.id, 'push')} className={`w-6 h-6 rounded flex items-center justify-center transition-all ${r.status==='push'?'bg-orange-400 text-white shadow-sm':'bg-slate-50 text-slate-300'}`}><span className="text-[7px] font-black">走</span></button>
                                                            <button onClick={()=>updateStatus(r.id, 'half')} className={`w-6 h-6 rounded flex items-center justify-center transition-all ${r.status==='half'?'bg-slate-700 text-white shadow-sm':'bg-slate-50 text-slate-300'}`}><span className="text-[7px] font-black">卡</span></button>
                                                        </div>
                                                    )}
                                                    <div className="text-right min-w-[55px]">
                                                        <div className={`text-[10px] font-black ${profit > 0 ? 'text-green-500' : profit < 0 ? 'text-red-500' : 'text-slate-300'}`}>{profit!==0?(profit>0?'+':'' )+Math.round(profit).toLocaleString():'0'}</div>
                                                        <div className="flex gap-2 justify-end mt-0.5 opacity-0 group-hover:opacity-100 transition-opacity">
                                                            <button onClick={() => { setIsEditing(true); setForm(r); window.scrollTo({ top: 0, behavior: 'smooth' }); }} className="text-slate-300"><Icon name="edit-3" size={8} /></button>
                                                            <button onClick={() => setDeletingId(r.id)} className="text-slate-300"><Icon name="trash-2" size={8} /></button>
                                                        </div>
                                                    </div>
                                                    {deletingId === r.id && (
                                                        <div className="absolute inset-0 bg-white/95 z-20 flex items-center justify-center gap-2 rounded-xl">
                                                            <span className="text-[8px] font-black text-red-600">刪除？</span>
                                                            <button onClick={async () => { await window.FB_CORE.deleteDoc(window.FB_CORE.doc(window.FB_CORE.db, 'artifacts', window.FB_CORE.appId, 'users', user.uid, 'records_'+activeBookId, r.id)); setDeletingId(null); }} className="bg-red-500 text-white px-2 py-0.5 rounded text-[8px] font-black">確認</button>
                                                            <button onClick={() => setDeletingId(null)} className="bg-slate-100 text-slate-500 px-2 py-0.5 rounded text-[8px] font-black">取消</button>
                                                        </div>
                                                    )}
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>

                    {isAddingBook && (
                        <div className="fixed inset-0 z-[70] flex items-center justify-center p-6 bg-slate-900/60 backdrop-blur-md">
                            <div className="bg-white w-full max-w-xs rounded-[2rem] p-8 shadow-2xl scale-in-center">
                                <h3 className="text-xl font-black mb-6 text-center text-slate-800">建立新帳簿</h3>
                                <div className="space-y-4 mb-8">
                                    <input value={newBookForm.name} onChange={e => setNewBookForm({...newBookForm, name: e.target.value})} className="input-field" placeholder="名稱" />
                                    <div className="grid grid-cols-2 gap-2">
                                        <button onClick={() => setNewBookForm({...newBookForm, type: 'sports'})} className={`py-4 rounded-xl text-[10px] font-black ${newBookForm.type === 'sports' ? 'bg-blue-600 text-white shadow-lg' : 'bg-slate-50 text-slate-400'}`}>體育</button>
                                        <button onClick={() => setNewBookForm({...newBookForm, type: 'baccarat'})} className={`py-4 rounded-xl text-[10px] font-black ${newBookForm.type === 'baccarat' ? 'bg-indigo-600 text-white shadow-lg' : 'bg-slate-50 text-slate-400'}`}>百家樂</button>
                                    </div>
                                </div>
                                <button onClick={async () => {
                                    if (!newBookForm.name) return;
                                    const fb = window.FB_CORE;
                                    const colRef = fb.collection(fb.db, 'artifacts', fb.appId, 'users', user.uid, 'books');
                                    await fb.addDoc(colRef, { name: newBookForm.name, type: newBookForm.type, unitAmount: '1000', createdAt: fb.serverTimestamp() });
                                    setIsAddingBook(false);
                                    setIsMenuOpen(false);
                                    setNewBookForm({name:'', type:'sports'});
                                }} className="w-full bg-slate-800 text-white py-4 rounded-xl font-black text-xs">立即建立</button>
                                <button onClick={() => setIsAddingBook(false)} className="w-full text-slate-400 text-[10px] font-bold mt-4 text-center">取消</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
