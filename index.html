<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>V28 雲端永久儲存系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Firebase 核心 SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
        import { getFirestore, collection, doc, addDoc, updateDoc, deleteDoc, onSnapshot, query, serverTimestamp, getDocs } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-auth.js";

        // Firebase 預設設定 (此處為模擬金鑰，環境會自動處理)
        const firebaseConfig = JSON.parse(window.__firebase_config || '{"apiKey":"","authDomain":"","projectId":"","storageBucket":"","messagingSenderId":"","appId":""}');
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'v28-storage-app';

        // 將功能掛載到視窗讓 React 腳本讀取
        window.FB_ENGINE = { db, auth, collection, doc, addDoc, updateDoc, deleteDoc, onSnapshot, query, serverTimestamp, getDocs, appId, signInAnonymously, onAuthStateChanged };
    </script>

    <style>
        body { font-family: -apple-system, system-ui, sans-serif; -webkit-tap-highlight-color: transparent; background: #0f172a; color: white; }
        .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; }
        .input-dark { background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 12px; width: 100%; color: white; outline: none; }
        .input-dark:focus { border-color: #3b82f6; box-shadow: 0 0 0 2px rgba(59,130,246,0.3); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        const LucideIcon = ({ name, size = 20, className = "" }) => {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const App = () => {
            const fb = window.FB_ENGINE;
            const [user, setUser] = useState(null);
            const [records, setRecords] = useState([]);
            const [loading, setLoading] = useState(true);
            const [activeBook, setActiveBook] = useState({ name: '我的體育帳簿', unit: 1000 });
            const [form, setForm] = useState({ date: new Date().toISOString().split('T')[0], match: '', odds: '', units: '1', status: 'pending' });

            // 1. 處理身份驗證與登入 (確保資料屬於你)
            useEffect(() => {
                const initAuth = async () => {
                    const auth = fb.auth;
                    fb.onAuthStateChanged(auth, (u) => {
                        if (u) {
                            setUser(u);
                        } else {
                            fb.signInAnonymously(auth);
                        }
                    });
                };
                initAuth();
            }, []);

            // 2. 即時從雲端同步資料 (這就是為什麼不會不見)
            useEffect(() => {
                if (!user) return;
                setLoading(true);
                // 路徑規範：/artifacts/{appId}/users/{userId}/records
                const colRef = fb.collection(fb.db, 'artifacts', fb.appId, 'users', user.uid, 'records');
                
                const unsubscribe = fb.onSnapshot(colRef, (snapshot) => {
                    const data = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
                    // 簡單排序：日期新到舊
                    setRecords(data.sort((a, b) => b.date.localeCompare(a.date)));
                    setLoading(false);
                }, (error) => {
                    console.error("Firestore Error:", error);
                    setLoading(false);
                });

                return () => unsubscribe();
            }, [user]);

            const handleSave = async (e) => {
                e.preventDefault();
                if (!user) return;
                const colRef = fb.collection(fb.db, 'artifacts', fb.appId, 'users', user.uid, 'records');
                try {
                    await fb.addDoc(colRef, {
                        ...form,
                        createdAt: fb.serverTimestamp()
                    });
                    setForm({ ...form, match: '', odds: '' }); // 清空部分欄位
                } catch (err) {
                    alert("儲存失敗，請檢查網路連接");
                }
            };

            const deleteRecord = async (id) => {
                if (!confirm("確定刪除此紀錄？")) return;
                const docRef = fb.doc(fb.db, 'artifacts', fb.appId, 'users', user.uid, 'records', id);
                await fb.deleteDoc(docRef);
            };

            if (loading) return (
                <div className="h-screen flex flex-col items-center justify-center space-y-4">
                    <div className="w-12 h-12 border-4 border-blue-500 border-t-transparent rounded-full animate-spin"></div>
                    <p className="font-black tracking-widest text-slate-400">雲端同步中...</p>
                </div>
            );

            return (
                <div className="max-w-md mx-auto p-4 space-y-6">
                    {/* Header */}
                    <div className="flex justify-between items-center py-4">
                        <div>
                            <h1 className="text-2xl font-black italic tracking-tighter">V28 CLOUD</h1>
                            <p className="text-[10px] text-blue-400 font-bold uppercase tracking-widest">User ID: {user?.uid.substring(0,8)}...</p>
                        </div>
                        <div className="text-right">
                            <p className="text-xs text-slate-400 font-bold uppercase">Cloud Status</p>
                            <div className="flex items-center gap-1 justify-end">
                                <div className="w-2 h-2 bg-green-500 rounded-full animate-pulse"></div>
                                <span className="text-[10px] font-bold">已連線</span>
                            </div>
                        </div>
                    </div>

                    {/* Form */}
                    <div className="glass-card p-6 space-y-4">
                        <form onSubmit={handleSave} className="space-y-3">
                            <input type="date" value={form.date} onChange={e => setForm({...form, date: e.target.value})} className="input-dark" />
                            <input placeholder="對戰組合 / 項目" value={form.match} onChange={e => setForm({...form, match: e.target.value})} className="input-dark" required />
                            <div className="grid grid-cols-2 gap-3">
                                <input placeholder="賠率" type="number" step="0.01" value={form.odds} onChange={e => setForm({...form, odds: e.target.value})} className="input-dark" required />
                                <input placeholder="注數" type="number" step="0.1" value={form.units} onChange={e => setForm({...form, units: e.target.value})} className="input-dark" />
                            </div>
                            <button type="submit" className="w-full bg-blue-600 hover:bg-blue-500 py-4 rounded-2xl font-black transition-all shadow-lg shadow-blue-900/20 active:scale-95">
                                寫入雲端紀錄
                            </button>
                        </form>
                    </div>

                    {/* List */}
                    <div className="space-y-3">
                        <h3 className="font-black text-xs text-slate-500 uppercase tracking-widest px-2">歷史同步資料 ({records.length})</h3>
                        {records.map(r => (
                            <div key={r.id} className="glass-card p-4 flex justify-between items-center group">
                                <div>
                                    <p className="font-bold text-sm">{r.match}</p>
                                    <p className="text-[10px] text-slate-500 font-medium">{r.date} · 賠率 {r.odds} · {r.units}注</p>
                                </div>
                                <div className="flex items-center gap-4">
                                    <div className="text-right">
                                        <span className="text-xs font-black text-blue-400">PENDING</span>
                                    </div>
                                    <button onClick={() => deleteRecord(r.id)} className="text-slate-600 hover:text-red-400 transition-colors">
                                        <LucideIcon name="trash-2" size={16} />
                                    </button>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
